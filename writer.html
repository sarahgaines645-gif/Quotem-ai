<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/q-auth.js?v=4"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Q — Writing Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #e8e8e8;
      --text: #1a1a1a;
      --text-muted: rgba(0,0,0,0.55);
      --text-faint: rgba(0,0,0,0.35);
      --accent: #e91e63;
      --paper:        #fbf9f3;          /* warm off-white — the front of the paper */
      --paper-back:   #ece8da;          /* slightly darker — the underside that shows on the curl */
      --paper-shadow: rgba(80,70,40,0.18);
      --paper-edge:   rgba(0,0,0,0.07);
      --neu-raised-sm: 6px 6px 16px #ababab, -5px -5px 12px #ffffff;
      --neu-inset-sm:  inset 3px 3px 8px #ababab, inset -2px -2px 6px #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      min-height: 100%;
    }
    body { padding: 28px 16px 100px; }

    header {
      max-width: 760px; margin: 0 auto 28px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header .brand { font-size: 26px; font-weight: 700; }
    header .brand .dot { color: var(--accent); }
    header .crumbs { color: var(--text-muted); font-size: 13px; }
    header a.back { color: var(--text-muted); text-decoration: none; font-size: 13px; }
    header a.back:hover { color: var(--accent); }

    /* The desk: a centred area where the paper sits.
       The paper itself is a card with a curled top-right corner. */
    .desk { max-width: 760px; margin: 0 auto; position: relative; }

    .paper {
      position: relative;
      background: var(--paper);
      border-radius: 4px 0 4px 4px;       /* sharp top-right where the curl bites in */
      padding: 64px 72px 80px;
      min-height: 920px;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.6) inset,            /* tiny top highlight */
        0 24px 50px -10px var(--paper-shadow),          /* lift off the page */
        0 6px 14px -4px rgba(0,0,0,0.08);
      /* Faint horizontal rule lines (notebook feel, very subtle).
         Set spacing to 32px to match the editor line-height. */
      background-image:
        linear-gradient(to bottom,
          transparent 0,
          transparent 95px,
          rgba(0,0,0,0.04) 95px,
          rgba(0,0,0,0.04) 96px,
          transparent 96px),
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 31px,
          rgba(0,0,0,0.025) 31px,
          rgba(0,0,0,0.025) 32px);
      background-attachment: local;
    }

    /* Margin line down the left side, like a notebook */
    .paper::after {
      content: '';
      position: absolute; top: 0; bottom: 0;
      left: 56px; width: 1px;
      background: rgba(233,30,99,0.18);
    }

    /* The curl. Triangular flap in the top-right corner showing the
       underside of the paper, with a soft drop shadow underneath. */
    .paper .curl {
      position: absolute; top: 0; right: 0;
      width: 56px; height: 56px;
      pointer-events: none;
    }
    .paper .curl::before {
      /* The shadow that the curling corner casts on the page */
      content: '';
      position: absolute; top: 6px; right: 6px;
      width: 44px; height: 44px;
      background: rgba(40,30,10,0.18);
      filter: blur(6px);
      border-radius: 0 0 0 100%;
    }
    .paper .curl::after {
      /* The folded triangle itself — gradient from back-paper colour
         to a slightly darker edge gives it depth. */
      content: '';
      position: absolute; top: 0; right: 0;
      width: 56px; height: 56px;
      background:
        linear-gradient(225deg,
          var(--paper-back) 0%,
          var(--paper-back) 48%,
          rgba(0,0,0,0.08) 49%,
          var(--paper) 50%,
          var(--paper) 100%);
      clip-path: polygon(100% 0, 100% 100%, 0 0);
      box-shadow: -1px 1px 2px rgba(0,0,0,0.05) inset;
    }

    /* Document content */
    .doc-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 28px; font-weight: 600;
      color: var(--text);
      border: none; outline: none;
      width: 100%; background: transparent;
      margin-bottom: 8px;
      padding: 0;
    }
    .doc-title::placeholder { color: rgba(0,0,0,0.25); font-style: italic; }

    .doc-meta {
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 14px;
      display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
    }

    /* Source slot — small paperclip button when empty, chip when filled.
       Sits just under the title. Quiet visual weight; doesn't compete
       with the writing surface. */
    .source-slot { margin: 0 0 24px; }
    .source-add {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 14px;
      background: transparent; border: none; cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px; color: var(--text-faint);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.06);
      border-radius: 14px;
      transition: color 0.15s, box-shadow 0.15s;
    }
    .source-add:hover { color: var(--text-muted); box-shadow: 0 0 0 1px rgba(0,0,0,0.12); }
    .source-chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 12px 7px 14px;
      background: var(--bg);
      box-shadow: var(--neu-inset-sm);
      border-radius: 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px; color: var(--text-muted);
      max-width: 100%;
    }
    .source-chip .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 240px; }
    .source-chip .remove {
      width: 20px; height: 20px; border: none; background: transparent;
      color: var(--text-faint); cursor: pointer; padding: 0; line-height: 1;
      font-size: 16px; display: inline-flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    .source-chip .remove:hover { color: var(--accent); }
    .source-chip.loading { opacity: 0.6; }

    /* Drop overlay — appears when a file is dragged anywhere over the page */
    .drop-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(232,232,232,0.85);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center; justify-content: center;
      pointer-events: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px; color: var(--text);
      border: 4px dashed var(--accent);
    }
    .drop-overlay.show { display: flex; }

    .doc-body {
      font-family: 'Lora', Georgia, serif;
      font-size: 16px; line-height: 32px;     /* matches the rule lines */
      color: var(--text);
      width: 100%; min-height: 700px;
      border: none; outline: none;
      background: transparent;
      resize: none;
    }
    .doc-body::placeholder { color: rgba(0,0,0,0.25); font-style: italic; }

    /* Floating Q card — same shape and shadow as the "Hi Sarah" card on
       sign-in. Q sits on this card. Small and out of the way; coaching
       messages will appear inside it as the user writes. ~5cm × 2.5cm. */
    .coach-card {
      position: fixed; right: 28px; top: 50%; transform: translateY(-50%);
      width: 190px; min-height: 95px;
      background: var(--bg);
      border-radius: 18px;
      box-shadow: 10px 10px 28px #ababab, -8px -8px 20px #ffffff;
      padding: 14px 16px;
      display: flex; flex-direction: column;
      cursor: default;
    }
    .coach-card .q-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 20px; color: var(--text);
      line-height: 1; margin-bottom: 6px;
    }
    .coach-card .q-logo .dot { color: var(--accent); }
    .coach-card .q-msg {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px; color: var(--text-muted);
      line-height: 1.4;
      max-height: 160px; overflow-y: auto;
      margin-bottom: 10px;
      flex: 1;
      /* Hide scrollbar — keep scroll behaviour, lose the chrome */
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .coach-card .q-msg::-webkit-scrollbar { display: none; }
    .coach-card .q-msg.thinking { font-style: italic; color: var(--text-faint); }
    .coach-card input.coach-input {
      width: 100%; border: none; outline: none;
      background: transparent; box-shadow: none;
      border-radius: 0; padding: 4px 0 5px;
      border-bottom: 1px solid rgba(0,0,0,0.10);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px; color: var(--text);
      touch-action: manipulation;
      transition: border-color 0.2s;
    }
    .coach-card input.coach-input:focus { border-bottom-color: var(--accent); }
    .coach-card input.coach-input::placeholder {
      color: var(--text-faint); font-style: italic;
    }

    /* Hide scrollbars on the writing textarea too — autosize keeps height
       in step with content so the user never needs to see a scroll chrome */
    .doc-body { scrollbar-width: none; -ms-overflow-style: none; }
    .doc-body::-webkit-scrollbar { display: none; }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      .paper { padding: 48px 28px 64px; min-height: 700px; }
      .paper::after { left: 22px; }
      .doc-title { font-size: 22px; }
      .doc-body { font-size: 15px; line-height: 28px; }
      .coach-card { right: 14px; bottom: 14px; top: auto; transform: none; width: 170px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">Q<span class="dot">.</span></div>
    <div class="crumbs">Writing Coach</div>
    <a href="/chat" class="back">← Back to chat</a>
  </header>

  <div class="desk">
    <div class="paper">
      <div class="curl"></div>

      <input type="text" class="doc-title" placeholder="Untitled document" />
      <div class="doc-meta">
        <span id="meta-words">0 words</span>
        <span id="meta-saved">Not yet saved</span>
      </div>

      <div class="source-slot" id="source-slot">
        <button type="button" class="source-add" id="source-add-btn"
          title="Drop, paste, or click to add a task / source">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
          <span>Drop the task / source — or paste / click</span>
        </button>
        <input type="file" id="source-file-input"
          accept=".pdf,.docx,.txt,.md,image/*"
          style="display: none" />
      </div>

      <textarea class="doc-body" id="doc-body"
        placeholder="Start writing — Q joins in once you do."
        autocomplete="off" spellcheck="true"></textarea>
    </div>
  </div>

  <div class="drop-overlay" id="drop-overlay">Drop the file — Q reads it</div>

  <div class="coach-card" id="coach-card">
    <div class="q-logo">Q<span class="dot">.</span></div>
    <div class="q-msg" id="coach-msg">I'm here. Type to me — I can see your page.</div>
    <input class="coach-input" id="coach-input" type="text"
      placeholder="Ask Q…" autocomplete="off" />
  </div>

  <script>
    const body = document.getElementById('doc-body');
    const titleEl = document.querySelector('.doc-title');
    const wordEl = document.getElementById('meta-words');
    const card = document.getElementById('coach-card');
    const msgEl = document.getElementById('coach-msg');
    const input = document.getElementById('coach-input');

    function countWords(s) {
      const t = (s || '').trim();
      return t ? t.split(/\s+/).length : 0;
    }
    body.addEventListener('input', () => {
      wordEl.textContent = countWords(body.value) + ' words';
    });

    function autosize() {
      body.style.height = 'auto';
      body.style.height = (body.scrollHeight) + 'px';
    }
    body.addEventListener('input', autosize);
    setTimeout(autosize, 0);

    /* DRAGGABLE Q CARD ─────────────────────────────────
       Click anywhere on the card except the input to start dragging.
       Position persists across reloads via localStorage. */
    let drag = null;
    function startDrag(ev) {
      if (ev.target === input) return;
      const point = ev.touches ? ev.touches[0] : ev;
      const rect = card.getBoundingClientRect();
      // Switch from right/transform anchoring to plain left/top so we can move freely
      card.style.right = 'auto';
      card.style.transform = 'none';
      card.style.left = rect.left + 'px';
      card.style.top = rect.top + 'px';
      drag = {
        startX: point.clientX, startY: point.clientY,
        baseLeft: rect.left, baseTop: rect.top,
      };
      ev.preventDefault();
    }
    function moveDrag(ev) {
      if (!drag) return;
      const point = ev.touches ? ev.touches[0] : ev;
      const dx = point.clientX - drag.startX;
      const dy = point.clientY - drag.startY;
      const newLeft = Math.max(8, Math.min(window.innerWidth - card.offsetWidth - 8, drag.baseLeft + dx));
      const newTop  = Math.max(8, Math.min(window.innerHeight - card.offsetHeight - 8, drag.baseTop + dy));
      card.style.left = newLeft + 'px';
      card.style.top = newTop + 'px';
    }
    function endDrag() {
      if (!drag) return;
      drag = null;
      try {
        localStorage.setItem('q-coach-pos', JSON.stringify({ left: card.style.left, top: card.style.top }));
      } catch (_) {}
    }
    card.addEventListener('mousedown', startDrag);
    card.addEventListener('touchstart', startDrag, { passive: false });
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('touchmove', moveDrag, { passive: false });
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    // Restore saved position
    try {
      const saved = JSON.parse(localStorage.getItem('q-coach-pos') || 'null');
      if (saved && saved.left && saved.top) {
        card.style.right = 'auto';
        card.style.transform = 'none';
        card.style.left = saved.left;
        card.style.top = saved.top;
      }
    } catch (_) {}

    /* SOURCE MATERIAL ─────────────────────────────────
       The task / brief / homework the user is writing about. Loaded via
       file picker, drag-drop, or paste. PDFs and DOCX go through
       /extract-text. Images keep their data URL so Q's vision can see
       them when needed. Plain text just sits as a string. */
    const sourceState = { name: null, text: null, imageDataUrl: null };
    const sourceSlot = document.getElementById('source-slot');
    const sourceAddBtn = document.getElementById('source-add-btn');
    const sourceFileInput = document.getElementById('source-file-input');
    const dropOverlay = document.getElementById('drop-overlay');

    function renderSourceSlot() {
      sourceSlot.innerHTML = '';
      if (!sourceState.name) {
        const btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'source-add'; btn.id = 'source-add-btn';
        btn.title = 'Drop, paste, or click to add a task / source';
        btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg><span>Drop the task / source — or paste / click</span>';
        btn.addEventListener('click', () => sourceFileInput.click());
        sourceSlot.appendChild(btn);
      } else {
        const chip = document.createElement('div');
        chip.className = 'source-chip';
        const icon = sourceState.imageDataUrl ? '🖼️' : '📄';
        chip.innerHTML = '<span>' + icon + '</span><span class="name"></span>'
          + '<button class="remove" title="Remove">×</button>';
        chip.querySelector('.name').textContent = sourceState.name;
        chip.querySelector('.remove').addEventListener('click', () => {
          sourceState.name = null; sourceState.text = null; sourceState.imageDataUrl = null;
          renderSourceSlot();
        });
        sourceSlot.appendChild(chip);
      }
      sourceSlot.appendChild(sourceFileInput);
    }
    renderSourceSlot();

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }
    function fileToText(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = reject;
        r.readAsText(file);
      });
    }

    async function loadSourceFile(file) {
      if (!file) return;
      const name = file.name || 'pasted file';
      sourceState.name = name + ' (loading…)';
      sourceState.text = null; sourceState.imageDataUrl = null;
      renderSourceSlot();
      try {
        const lower = name.toLowerCase();
        if (file.type.startsWith('image/')) {
          sourceState.imageDataUrl = await fileToDataUrl(file);
          sourceState.name = name;
        } else if (lower.endsWith('.pdf') || lower.endsWith('.docx')
                   || file.type === 'application/pdf'
                   || file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
          const dataUrl = await fileToDataUrl(file);
          const r = await fetch('/extract-text', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dataUrl, name }),
          });
          const data = await r.json();
          if (!r.ok) throw new Error(data.error || 'Could not read that file');
          sourceState.text = data.text || '';
          sourceState.name = name;
        } else if (lower.endsWith('.txt') || lower.endsWith('.md') || file.type.startsWith('text/')) {
          sourceState.text = await fileToText(file);
          sourceState.name = name;
        } else {
          throw new Error('Unsupported file type — try PDF, Word, image, or .txt');
        }
        renderSourceSlot();
      } catch (e) {
        sourceState.name = null; sourceState.text = null; sourceState.imageDataUrl = null;
        renderSourceSlot();
        alert('Could not load that file: ' + e.message);
      }
    }

    sourceFileInput.addEventListener('change', (ev) => {
      const f = ev.target.files && ev.target.files[0];
      if (f) loadSourceFile(f);
      ev.target.value = '';
    });

    // Drag-drop anywhere on the page
    let dragDepth = 0;
    window.addEventListener('dragenter', (e) => {
      if (e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files')) {
        dragDepth++; dropOverlay.classList.add('show');
      }
    });
    window.addEventListener('dragleave', () => {
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) dropOverlay.classList.remove('show');
    });
    window.addEventListener('dragover', (e) => {
      if (e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files')) e.preventDefault();
    });
    window.addEventListener('drop', (e) => {
      e.preventDefault();
      dragDepth = 0; dropOverlay.classList.remove('show');
      const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) loadSourceFile(f);
    });

    // Paste — image or text
    window.addEventListener('paste', (e) => {
      // If user is typing in the body or title or coach input, don't intercept
      const tag = (document.activeElement && document.activeElement.tagName) || '';
      if (tag === 'TEXTAREA' || tag === 'INPUT') return;
      const items = (e.clipboardData && e.clipboardData.items) || [];
      for (const it of items) {
        if (it.kind === 'file') {
          const f = it.getAsFile();
          if (f) { loadSourceFile(f); return; }
        }
      }
      // Plain text paste — only fill source if it's not already set
      const text = e.clipboardData ? e.clipboardData.getData('text') : '';
      if (text && text.length > 50 && !sourceState.name) {
        sourceState.text = text;
        sourceState.name = 'Pasted text (' + text.length + ' chars)';
        renderSourceSlot();
      }
    });

    /* CHAT TO Q ─────────────────────────────────
       Sends to the same /chat endpoint the main chat uses, so Q has all
       his memory and persona. We prepend a small context block so Q can
       see what the user is currently writing AND the source/task. */
    async function askQ(userText) {
      const t = (titleEl.value || '').trim();
      const b = (body.value || '').trim();
      const sourceBlock = sourceState.text
        ? `[The task / source she's writing about — "${sourceState.name}"]\n${sourceState.text.slice(0, 3000)}\n[end source]\n\n`
        : sourceState.imageDataUrl
          ? `[She's attached an image as the task: "${sourceState.name}". Use your vision to read it if relevant.]\n\n`
          : '';
      const docBlock = b
        ? `[Writing Coach — what I'm working on right now]\nTitle: ${t || 'untitled'}\n\n${b.slice(0, 1500)}\n[end]\n\n`
        : `[Writing Coach — the page is still blank]\n\n`;
      const message = sourceBlock + docBlock + userText;

      msgEl.classList.add('thinking');
      msgEl.textContent = 'thinking…';
      const fetchBody = { message, surface: 'writer' };
      if (sourceState.imageDataUrl) {
        fetchBody.images = [{ dataUrl: sourceState.imageDataUrl, name: sourceState.name }];
      }
      try {
        const r = await fetch('/chat', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(fetchBody),
        });
        const data = await r.json().catch(() => ({}));
        msgEl.classList.remove('thinking');
        msgEl.textContent = (data.reply || data.error || 'Q went quiet — try again.').toString();
        msgEl.scrollTop = 0;
      } catch (e) {
        msgEl.classList.remove('thinking');
        msgEl.textContent = 'Network blip — try again.';
      }
    }

    input.addEventListener('keydown', (ev) => {
      if (ev.key !== 'Enter') return;
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      askQ(text);
    });
  </script>
</body>
</html>
