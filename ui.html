<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q — Quotem's AI Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8eaed;
    --text: #2a2f36;
    --muted: #6b7280;
    --raised: #e8eaed;
    --shadow-light: #ffffff;
    --shadow-dark: #c3c5c9;
    --accent: #1a73e8;
    --accent-pink: #e91e63;
    --ok: #059669;
    --warn: #d97706;
    --err: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px;
    min-height: 100vh;
  }
  h1 { font-weight: 700; font-size: 32px; margin: 0 0 4px; letter-spacing: -0.02em; }
  h1 .dot { color: var(--accent-pink); }
  .sub { color: var(--muted); margin: 0 0 28px; font-size: 14px; }
  .card {
    background: var(--raised);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
  }
  .card h2 { font-size: 15px; font-weight: 500; margin: 0 0 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .preset-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .preset {
    font-family: inherit;
    font-size: 13px;
    padding: 8px 14px;
    border: none;
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
    transition: all 0.1s;
  }
  .preset:hover { color: var(--accent); }
  .preset:active { box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light); }
  textarea {
    width: 100%;
    min-height: 120px;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    resize: vertical;
    background: var(--bg);
    color: var(--text);
    box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
  }
  textarea:focus { outline: none; }
  .actions { display: flex; gap: 10px; margin-top: 14px; }
  .btn {
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    padding: 12px 24px;
    border: none;
    border-radius: 12px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
    transition: all 0.1s;
  }
  .btn:hover:not(:disabled) { color: var(--accent); }
  .btn:active:not(:disabled) { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); }
  .btn:disabled { opacity: 0.5; cursor: wait; }
  .btn.primary { color: var(--accent); font-weight: 700; }
  #status { font-size: 13px; color: var(--muted); margin-top: 10px; min-height: 20px; }
  #status.thinking { color: var(--accent); }
  #status.ok { color: var(--ok); }
  #status.err { color: var(--err); }
  .item {
    background: var(--bg);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
  }
  .item .work { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
  .item .meta { display: flex; gap: 14px; flex-wrap: wrap; font-size: 13px; color: var(--muted); }
  .item .meta b { color: var(--text); font-weight: 500; }
  .intent-pill { padding: 2px 8px; border-radius: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .intent-replace { background: #fce7f3; color: #9f1239; }
  .intent-repair { background: #dbeafe; color: #1e40af; }
  .intent-inspect { background: #fef3c7; color: #92400e; }
  .empty { color: var(--muted); font-style: italic; font-size: 14px; }
  .stats { font-size: 12px; color: var(--muted); margin-top: 12px; border-top: 1px solid rgba(0,0,0,0.06); padding-top: 10px; display: flex; gap: 16px; flex-wrap: wrap; }
  .raw-toggle { background: transparent; border: none; color: var(--muted); font-family: inherit; font-size: 12px; cursor: pointer; padding: 0; margin-top: 8px; text-decoration: underline; }
  pre.raw { background: #1a1a1a; color: #d4d4d4; border-radius: 10px; padding: 14px; overflow-x: auto; font-size: 12px; margin-top: 10px; }
  .hidden { display: none; }
</style>
</head>
<body>

<h1>Q<span class="dot">.</span></h1>
<p class="sub">Quotem's own AI — running on Qwen 3 235B via Together. Isolated test lab. Not wired into live Quotem.</p>

<div class="card">
  <h2>Quick tests (click a button to load example text)</h2>
  <div class="preset-row">
    <button class="preset" data-text="200 metres of copper pipe needed">200m copper pipe</button>
    <button class="preset" data-text="fix the leaky bog">leaky bog</button>
    <button class="preset" data-text="new front door needed at 23 High Street, Brighton BN1 1AA">new front door (+ address)</button>
    <button class="preset" data-text="replace 5 roof tiles above bedroom 1">5 roof tiles</button>
    <button class="preset" data-text="3x2m bathroom needs full redecoration">bathroom redec</button>
    <button class="preset" data-text="Service and alignment of the front door. Also check the guttering above bedroom 2 and regrout the bathroom wall tiles where there's a 1m² damaged area. Previous attempts to fix the door have been unsuccessful. Mrs Sackley 07513883866">mixed email test</button>
    <button class="preset" data-text="Habinteg kitchen">Habinteg kitchen (spec only)</button>
    <button class="preset" data-text="80 metres of 10mm twin and earth cable and a new cooker unit">80m cable + cooker unit</button>
  </div>
</div>

<div class="card">
  <h2>Ask Q</h2>
  <textarea id="input" placeholder="Paste or type any text — email, notes, work order, voice transcript..."></textarea>
  <div class="actions">
    <button class="btn primary" id="ask">Ask Q</button>
    <button class="btn" id="clear">Clear</button>
  </div>
  <div id="status"></div>
</div>

<div class="card">
  <h2>Q's answer</h2>
  <div id="result">
    <p class="empty">Nothing yet — click <b>Ask Q</b> after loading text above.</p>
  </div>
</div>

<script>
const $input = document.getElementById('input');
const $status = document.getElementById('status');
const $result = document.getElementById('result');
const $ask = document.getElementById('ask');

document.querySelectorAll('.preset').forEach(btn => {
  btn.addEventListener('click', () => {
    $input.value = btn.dataset.text;
    $input.focus();
  });
});

document.getElementById('clear').addEventListener('click', () => {
  $input.value = '';
  $result.innerHTML = '<p class="empty">Cleared. Type or pick a preset.</p>';
  $status.textContent = '';
  $status.className = '';
});

$ask.addEventListener('click', async () => {
  const text = $input.value.trim();
  if (!text) {
    $status.textContent = 'Type or paste something first.';
    $status.className = 'err';
    return;
  }
  $ask.disabled = true;
  $status.textContent = 'Q is thinking…';
  $status.className = 'thinking';
  $result.innerHTML = '';
  const t0 = Date.now();
  try {
    const response = await fetch('/text-reader?text=' + encodeURIComponent(text));
    const data = await response.json();
    const clientMs = Date.now() - t0;
    renderResult(data, clientMs);
    $status.textContent = 'Done in ' + clientMs + 'ms (client-side timing)';
    $status.className = 'ok';
  } catch (err) {
    $status.textContent = 'Error: ' + err.message;
    $status.className = 'err';
    $result.innerHTML = '<p class="empty">Request failed. Check the network tab or try again.</p>';
  } finally {
    $ask.disabled = false;
  }
});

function renderResult(data, clientMs) {
  const items = data.items || [];
  const meta = data._meta || {};

  let html = '';
  if (items.length === 0) {
    html += '<p class="empty">No work items extracted. Could mean Q didn\'t find any, or the input had no concrete work.</p>';
  } else {
    items.forEach((item, i) => {
      const intentClass = 'intent-' + (item.intent || 'inspect');
      html += '<div class="item">';
      html += '  <div class="work">' + escapeHtml(item.work) + '</div>';
      html += '  <div class="meta">';
      html += '    <span class="intent-pill ' + intentClass + '">' + escapeHtml(item.intent || '—') + '</span>';
      html += '    <span><b>qty:</b> ' + item.qty + '</span>';
      html += '    <span><b>unit:</b> ' + escapeHtml(item.unit || '—') + '</span>';
      if (item.detail) html += '    <span><b>detail:</b> ' + escapeHtml(item.detail) + '</span>';
      html += '  </div>';
      html += '</div>';
    });
  }

  if (data.address) {
    html += '<div class="item" style="background: #e0f2fe;"><b>Address detected:</b> ' + escapeHtml(data.address) + '</div>';
  }

  const qwenMs = meta.durationMs || 0;
  const tokensIn = meta.tokensIn || 0;
  const tokensOut = meta.tokensOut || 0;
  const costPence = (((tokensIn + tokensOut) / 1000000) * 70).toFixed(3);

  html += '<div class="stats">';
  html += '  <span>Q call: <b>' + qwenMs + 'ms</b></span>';
  html += '  <span>Tokens in: <b>' + tokensIn + '</b></span>';
  html += '  <span>Tokens out: <b>' + tokensOut + '</b></span>';
  html += '  <span>Approx cost: <b>' + costPence + 'p</b></span>';
  if (meta.error) html += '  <span style="color: var(--err);">Error: <b>' + escapeHtml(meta.error) + '</b></span>';
  html += '</div>';

  html += '<button class="raw-toggle" onclick="document.getElementById(\'raw\').classList.toggle(\'hidden\')">Show / hide raw JSON</button>';
  html += '<pre id="raw" class="raw hidden">' + escapeHtml(JSON.stringify(data, null, 2)) + '</pre>';

  $result.innerHTML = html;
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
<script src="/trace-widget.js"></script>
</body>
</html>
