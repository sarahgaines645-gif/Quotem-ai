<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/q-auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q Thread</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
  :root {
    --bg: #e8e8e8; --text: #1a1a1a;
    --text-muted: rgba(0,0,0,0.42); --text-faint: rgba(0,0,0,0.26);
    --shadow-light: #ffffff; --shadow-dark: #ababab;
    --accent: #e91e63; --accent-soft: rgba(233,30,99,0.12);
    --warn: #d97706;
    --neu-raised: 10px 10px 28px #ababab, -8px -8px 20px #ffffff, inset 0 1px 0 rgba(255,255,255,0.5);
    --neu-raised-sm: 6px 6px 16px #ababab, -5px -5px 12px #ffffff;
    --neu-inset: inset 5px 5px 14px #ababab, inset -4px -4px 10px #ffffff;
    --neu-inset-sm: inset 3px 3px 8px #ababab, inset -2px -2px 6px #ffffff;
    --neu-inset-xs: inset 3px 3px 8px #ababab, inset -2px -2px 6px #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Space Grotesk', -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.55; min-height: 100vh; padding: 32px 24px 80px; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 880px; margin: 0 auto; }

  header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
  .logo-mark { display: inline-flex; align-items: baseline; }
  .logo-mark .q { font-size: 28px; font-weight: 700; line-height: 1; letter-spacing: -0.05em; }
  .logo-mark .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-left: 4px; align-self: flex-end; margin-bottom: 4px; box-shadow: 0 1px 2px rgba(233,30,99,0.3); }
  .header-back { font-size: 12px; color: var(--text-muted); text-decoration: none; margin-left: auto; }
  .header-back:hover { color: var(--text); }

  .title-card { background: var(--bg); border-radius: 18px; padding: 18px 22px; box-shadow: var(--neu-raised); margin-bottom: 18px; }
  .title-row { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .title-input { flex: 1; min-width: 200px; border: none; outline: none; font-family: inherit; font-size: 22px; font-weight: 700; letter-spacing: -0.03em; background: transparent; color: var(--text); padding: 4px 0; }
  .title-input:focus { box-shadow: var(--neu-inset-xs); border-radius: 8px; padding: 4px 8px; margin: 0 -8px; }
  .status-pick { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; padding: 5px 12px; border-radius: 8px; box-shadow: var(--neu-raised-sm); cursor: pointer; background: var(--bg); border: none; font-family: inherit; color: var(--text-muted); }
  .status-pick.on { box-shadow: var(--neu-inset-xs); color: var(--accent); }
  .summary-input { width: 100%; border: none; outline: none; font-family: inherit; font-size: 13px; color: var(--text-muted); background: transparent; padding: 6px 0 0; resize: none; }
  .summary-input:focus { box-shadow: var(--neu-inset-xs); border-radius: 8px; padding: 6px 10px; margin: 0 -10px; }

  .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint); margin: 22px 4px 10px; }

  /* Email cards */
  .email-list { display: flex; flex-direction: column; gap: 10px; }
  .email-card {
    background: var(--bg); border-radius: 14px; padding: 12px 16px;
    box-shadow: var(--neu-raised-sm); transition: box-shadow 0.15s;
  }
  .email-card:hover { box-shadow: var(--neu-raised); }
  .email-card.expanded { box-shadow: var(--neu-inset-sm); }
  .email-head { display: flex; align-items: center; gap: 10px; cursor: pointer; flex-wrap: wrap; }
  .email-icon { font-size: 16px; flex-shrink: 0; }
  .email-meta { flex: 1; min-width: 0; font-size: 13px; color: var(--text); }
  .email-meta .ppl { font-weight: 600; }
  .email-meta .dt  { color: var(--text-muted); font-size: 12px; }
  .email-pill { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 8px; box-shadow: var(--neu-inset-xs); white-space: nowrap; color: var(--text-muted); }
  .email-pill.fast { color: #16a34a; }
  .email-pill.slow { color: var(--warn); }
  .email-pill.bad  { color: var(--accent); }
  .email-pill.none { color: var(--text-faint); }
  .email-body { display: none; padding: 12px 4px 4px; font-size: 14px; line-height: 1.65; color: var(--text); white-space: pre-wrap; word-wrap: break-word; border-top: 1px solid var(--shadow-dark); margin-top: 12px; }
  .email-card.expanded .email-body { display: block; }
  .email-body .subject { font-weight: 700; margin-bottom: 8px; }

  /* Files / evidence */
  .files-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .file-card { background: var(--bg); border-radius: 12px; padding: 10px 14px; box-shadow: var(--neu-raised-sm); display: flex; align-items: center; gap: 12px; }
  .file-icon { font-size: 20px; flex-shrink: 0; }
  .file-meta { flex: 1; min-width: 0; }
  .file-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-sub  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .file-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .file-actions a, .file-actions button { font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 8px; box-shadow: var(--neu-raised-sm); border: none; cursor: pointer; background: var(--bg); color: var(--text-muted); font-family: inherit; text-decoration: none; }
  .file-actions a:hover, .file-actions button:hover { color: var(--accent); }
  .file-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; box-shadow: var(--neu-inset-xs); }

  .upload-drop {
    border: 2px dashed var(--shadow-dark); border-radius: 12px;
    padding: 18px; text-align: center; color: var(--text-muted);
    cursor: pointer; font-size: 13px; transition: color 0.15s, border-color 0.15s;
  }
  .upload-drop:hover, .upload-drop.dragging { color: var(--accent); border-color: var(--accent); }
  .upload-drop input { display: none; }
  .upload-status { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  /* Add email form */
  .add-email-card { background: var(--bg); border-radius: 14px; padding: 14px 16px; box-shadow: var(--neu-inset-sm); margin-top: 10px; }
  .add-email-card.collapsed .add-email-form { display: none; }
  .add-email-toggle { font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; }
  .add-email-toggle:hover { color: var(--accent); }
  .add-email-form { margin-top: 10px; }
  .ae-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .ae-row select, .ae-row input { border: none; outline: none; font-family: inherit; font-size: 13px; color: var(--text); background: var(--bg); padding: 7px 12px; border-radius: 8px; box-shadow: var(--neu-inset-xs); }
  .ae-row input { flex: 1; min-width: 100px; }
  .ae-row select { cursor: pointer; }
  .add-email-form textarea { width: 100%; min-height: 100px; border: none; outline: none; resize: vertical; font-family: inherit; font-size: 13px; color: var(--text); background: var(--bg); padding: 10px 14px; border-radius: 10px; box-shadow: var(--neu-inset-xs); line-height: 1.55; }
  .ae-controls { display: flex; gap: 8px; margin-top: 8px; }
  .ae-btn { border: none; cursor: pointer; background: var(--accent); color: white; font-family: inherit; font-size: 13px; font-weight: 700; padding: 8px 18px; border-radius: 10px; box-shadow: var(--neu-raised-sm); }
  .ae-btn.secondary { background: var(--bg); color: var(--text-muted); }
  .ae-btn:hover:not(:disabled) { opacity: 0.9; }

  /* Chat surface */
  .chat-card { background: var(--bg); border-radius: 18px; padding: 18px 20px; box-shadow: var(--neu-raised); margin-top: 18px; }
  .chat-thread { display: flex; flex-direction: column; gap: 12px; max-height: 600px; overflow-y: auto; padding: 4px; margin-bottom: 14px; }
  .chat-msg { display: flex; gap: 10px; align-items: flex-start; }
  .chat-msg.user { flex-direction: row-reverse; }
  .chat-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--bg); box-shadow: var(--neu-raised-sm); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .chat-avatar.q { color: var(--accent); }
  .chat-avatar.user { color: var(--text-muted); font-size: 14px; }
  .chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 14px; background: var(--bg); box-shadow: var(--neu-inset-sm); font-size: 14px; line-height: 1.6; }
  .chat-bubble.user { box-shadow: var(--neu-raised-sm); }
  .chat-bubble.q h1, .chat-bubble.q h2, .chat-bubble.q h3 { font-size: 14px; font-weight: 700; color: var(--accent); margin: 10px 0 4px; }
  .chat-bubble.q h1:first-child, .chat-bubble.q h2:first-child, .chat-bubble.q h3:first-child { margin-top: 0; }
  .chat-bubble.q p { margin: 0 0 8px; }
  .chat-bubble.q p:last-child { margin-bottom: 0; }
  .chat-bubble.q ol, .chat-bubble.q ul { margin: 6px 0 8px 22px; }
  .chat-bubble.q li { margin-bottom: 3px; }
  .chat-bubble.q strong { font-weight: 700; }
  .chat-bubble.q a { color: var(--accent); text-decoration: underline; }
  .chat-bubble.q code { font-family: monospace; font-size: 13px; background: var(--accent-soft); padding: 1px 5px; border-radius: 4px; }
  .chat-input-row { display: flex; gap: 10px; align-items: flex-end; }
  .chat-input-row textarea { flex: 1; border: none; outline: none; resize: none; font-family: inherit; font-size: 14px; color: var(--text); background: var(--bg); padding: 12px 16px; border-radius: 12px; box-shadow: var(--neu-inset-sm); line-height: 1.5; min-height: 44px; max-height: 120px; }
  .chat-send { border: none; cursor: pointer; background: var(--accent); color: white; font-family: inherit; font-size: 14px; font-weight: 700; padding: 12px 22px; border-radius: 12px; box-shadow: var(--neu-raised-sm); flex-shrink: 0; }
  .chat-send:hover:not(:disabled) { opacity: 0.9; }
  .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }
  .chat-typing { font-size: 12px; color: var(--text-muted); padding: 4px 0; font-style: italic; display: none; }
  .chat-typing.show { display: block; }
  /* Clickable option buttons under a Q message */
  .chat-options { display: flex; flex-direction: column; gap: 6px; margin: 8px 0 0 40px; max-width: 85%; }
  .chat-option {
    background: var(--bg); padding: 10px 14px; border-radius: 12px;
    box-shadow: var(--neu-raised-sm); text-align: left;
    font-size: 13px; font-weight: 500; color: var(--text);
    cursor: pointer; line-height: 1.4; border: none; font-family: inherit;
    transition: color 0.15s;
  }
  .chat-option:hover { color: var(--accent); }
  .chat-option:active { box-shadow: var(--neu-inset-xs); }
  .chat-option:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <span class="logo-mark"><span class="q">Q</span><span class="dot"></span></span>
    <a href="/threads" class="header-back">← all threads</a>
  </header>

  <div class="title-card">
    <div class="title-row">
      <input type="text" class="title-input" id="title-input" placeholder="Untitled situation">
      <button class="status-pick" id="status-pick" data-value="open">Open</button>
    </div>
    <textarea class="summary-input" id="summary-input" rows="1" placeholder="One-line summary…"></textarea>
  </div>

  <div class="section-label">📨 Correspondence</div>
  <div id="email-list" class="email-list"></div>

  <div class="add-email-card collapsed" id="add-email-card">
    <div class="add-email-toggle" id="add-email-toggle">＋ Add an email to this thread</div>
    <div class="add-email-form">
      <div class="ae-row">
        <select id="ae-type">
          <option value="in">📥 Received</option>
          <option value="out">📤 Sent</option>
        </select>
        <input type="text" id="ae-from" placeholder="From">
        <input type="text" id="ae-to"   placeholder="To">
      </div>
      <div class="ae-row">
        <input type="text" id="ae-date"    placeholder="Date (e.g. 5 May 2026)">
        <input type="text" id="ae-subject" placeholder="Subject">
      </div>
      <textarea id="ae-body" placeholder="Paste the email body here…"></textarea>
      <div class="ae-controls">
        <button class="ae-btn" id="ae-save">Add to thread</button>
        <button class="ae-btn secondary" id="ae-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <div class="section-label">📎 Files &amp; evidence</div>
  <div class="files-list" id="files-list"></div>
  <div class="upload-drop" id="upload-drop">
    <input type="file" id="file-input" multiple>
    Drop files here or click to upload — photos, PDFs, screenshots, anything
    <div class="upload-status" id="upload-status"></div>
  </div>

  <div class="section-label">💬 Q on the case</div>
  <div class="chat-card">
    <div class="chat-thread" id="chat-thread"></div>
    <div class="chat-typing" id="chat-typing">Q is thinking…</div>
    <div class="chat-input-row">
      <textarea id="chat-input" rows="1" placeholder="Talk to Q about this case — he sees everything in this thread…"></textarea>
      <button class="chat-send" id="chat-send">Send</button>
    </div>
  </div>

</div>

<script>
const threadId = location.pathname.split('/').filter(Boolean).pop();

// State
let thread = null;
const $title    = document.getElementById('title-input');
const $summary  = document.getElementById('summary-input');
const $statusBtn = document.getElementById('status-pick');
const $emailList = document.getElementById('email-list');
const $aeCard   = document.getElementById('add-email-card');
const $aeToggle = document.getElementById('add-email-toggle');
const $aeSave   = document.getElementById('ae-save');
const $aeCancel = document.getElementById('ae-cancel');
const $chatThread = document.getElementById('chat-thread');
const $chatInput  = document.getElementById('chat-input');
const $chatSend   = document.getElementById('chat-send');
const $chatTyping = document.getElementById('chat-typing');

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function fmtAgo(iso) {
  if (!iso) return '';
  const ms = Date.now() - new Date(iso).getTime();
  const m = Math.floor(ms / 60_000);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const d = Math.floor(h / 24);
  return d + 'd ago';
}

function pillForResponseTime(currentEmail, prevOpposite) {
  if (!prevOpposite) return { text: 'first message', class: 'none' };
  // Use email.date if parseable, else fall back to addedAt
  const a = parseDateLoose(prevOpposite.date) || new Date(prevOpposite.addedAt);
  const b = parseDateLoose(currentEmail.date) || new Date(currentEmail.addedAt);
  const ms = b.getTime() - a.getTime();
  if (ms < 0 || isNaN(ms)) return { text: '', class: 'none' };
  const days = ms / 86_400_000;
  const direction = currentEmail.type === 'in' ? 'they replied' : 'you replied';
  if (days < 1) return { text: direction + ' same day', class: 'fast' };
  if (days < 2) return { text: direction + ' next day', class: 'fast' };
  if (days < 7) return { text: `${direction} in ${Math.round(days)} day${Math.round(days)===1?'':'s'}`, class: days < 4 ? 'fast' : 'slow' };
  if (days < 31) {
    const wks = Math.round(days / 7);
    return { text: `${direction} after ${wks} week${wks===1?'':'s'}`, class: wks <= 2 ? 'slow' : 'bad' };
  }
  const months = Math.round(days / 30);
  return { text: `${direction} after ${months} month${months===1?'':'s'}`, class: 'bad' };
}

function parseDateLoose(s) {
  if (!s) return null;
  const t = Date.parse(s);
  if (!isNaN(t)) return new Date(t);
  return null;
}

function renderEmails() {
  $emailList.innerHTML = '';
  const emails = thread.emails || [];
  if (!emails.length) {
    $emailList.innerHTML = '<div style="font-size:13px;color:var(--text-faint);text-align:center;padding:20px;">No emails yet — click "Add an email" below.</div>';
    return;
  }
  emails.forEach((e, i) => {
    const prevOpposite = [...emails.slice(0, i)].reverse().find(p => p.type !== e.type);
    const pill = pillForResponseTime(e, prevOpposite);

    const card = document.createElement('div');
    card.className = 'email-card';
    const icon = e.type === 'in' ? '📥' : '📤';
    const ppl = e.type === 'in'
      ? (e.from ? `From <span class="ppl">${escapeHtml(e.from)}</span>` : 'Received')
      : (e.to   ? `To <span class="ppl">${escapeHtml(e.to)}</span>`     : 'Sent');
    const dt = e.date || fmtAgo(e.addedAt);

    card.innerHTML = `
      <div class="email-head">
        <span class="email-icon">${icon}</span>
        <span class="email-meta">${ppl} <span class="dt">· ${escapeHtml(dt)}</span></span>
        <span class="email-pill ${pill.class}">${escapeHtml(pill.text)}</span>
      </div>
      <div class="email-body">
        ${e.subject ? `<div class="subject">${escapeHtml(e.subject)}</div>` : ''}
        ${escapeHtml(e.body || '')}
      </div>`;
    card.querySelector('.email-head').addEventListener('click', () => {
      card.classList.toggle('expanded');
    });
    $emailList.appendChild(card);
  });
}

function renderFiles() {
  const $list = document.getElementById('files-list');
  $list.innerHTML = '';
  const files = thread.files || [];
  if (!files.length) return;
  for (const f of files) {
    const card = document.createElement('div');
    card.className = 'file-card';
    const isImage = (f.mimeType || '').startsWith('image/');
    const url = '/api/threads/' + threadId + '/files/' + encodeURIComponent(f.filename);
    const icon = isImage ? '' : (
      f.mimeType?.includes('pdf')   ? '📄' :
      f.mimeType?.includes('word')  ? '📝' :
      f.mimeType?.includes('audio') ? '🔊' :
      f.mimeType?.includes('video') ? '🎬' :
      f.mimeType?.includes('sheet') ? '📊' : '📎'
    );
    card.innerHTML = `
      ${isImage ? `<img class="file-thumb" src="${url}" alt="">` : `<div class="file-icon">${icon}</div>`}
      <div class="file-meta">
        <div class="file-name">${escapeHtml(f.filename)}</div>
        <div class="file-sub">${(f.size / 1024).toFixed(0)} KB · ${escapeHtml(f.mimeType || '')} · ${fmtAgo(f.uploadedAt)}</div>
      </div>
      <div class="file-actions">
        <a href="${url}" target="_blank" rel="noopener">Open</a>
        <button data-name="${escapeHtml(f.filename)}" class="del-file">Delete</button>
      </div>`;
    card.querySelector('.del-file').addEventListener('click', async (ev) => {
      if (!confirm('Delete ' + f.filename + '?')) return;
      const r = await fetch(url, { method: 'DELETE' });
      if (r.ok) { thread = await r.json(); renderFiles(); }
    });
    $list.appendChild(card);
  }
}

const $uploadDrop = document.getElementById('upload-drop');
const $fileInput  = document.getElementById('file-input');
const $uploadStatus = document.getElementById('upload-status');

$uploadDrop.addEventListener('click', () => $fileInput.click());
$uploadDrop.addEventListener('dragover', (e) => { e.preventDefault(); $uploadDrop.classList.add('dragging'); });
$uploadDrop.addEventListener('dragleave', () => $uploadDrop.classList.remove('dragging'));
$uploadDrop.addEventListener('drop', (e) => {
  e.preventDefault(); $uploadDrop.classList.remove('dragging');
  if (e.dataTransfer.files?.length) handleFiles(e.dataTransfer.files);
});
$fileInput.addEventListener('change', () => {
  if ($fileInput.files?.length) handleFiles($fileInput.files);
});

async function handleFiles(fileList) {
  const files = Array.from(fileList);
  for (const file of files) {
    $uploadStatus.textContent = 'Uploading ' + file.name + '…';
    try {
      const base64 = await fileToBase64(file);
      const res = await fetch('/api/threads/' + threadId + '/files', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          filename: file.name,
          mimeType: file.type || 'application/octet-stream',
          base64,
        }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      thread = await res.json();
      renderFiles();
      $uploadStatus.textContent = 'Uploaded ' + file.name;
    } catch (e) {
      $uploadStatus.textContent = 'Upload failed: ' + (e.message || 'unknown');
    }
  }
  $fileInput.value = '';
  setTimeout(() => { $uploadStatus.textContent = ''; }, 3000);
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderChat() {
  $chatThread.innerHTML = '';
  for (const m of (thread.chatHistory || [])) {
    appendChatMsg(m.role === 'assistant' ? 'q' : 'user', m.content);
  }
}

function parseOptionsBlock(content) {
  // Pull a trailing [OPTIONS]...[/OPTIONS] block out of Q's message and
  // return { stripped, options[] }. Each option is a full answer string.
  const m = content && content.match(/\[OPTIONS\]([\s\S]*?)\[\/OPTIONS\]\s*$/i);
  if (!m) return { stripped: content || '', options: [] };
  const optionsBlock = m[1];
  const options = optionsBlock
    .split('\n')
    .map(l => l.replace(/^\s*[-*]\s*/, '').trim())
    .filter(Boolean);
  return { stripped: content.replace(m[0], '').trim(), options };
}

function appendChatMsg(role, content) {
  const msgEl = document.createElement('div');
  msgEl.className = 'chat-msg ' + (role === 'q' ? 'q' : 'user');
  const avatar = document.createElement('div');
  avatar.className = 'chat-avatar ' + (role === 'q' ? 'q' : 'user');
  avatar.textContent = role === 'q' ? 'Q' : '🙂';
  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble ' + (role === 'q' ? 'q' : 'user');

  let optionsToRender = [];
  if (role === 'q') {
    const { stripped, options } = parseOptionsBlock(content || '');
    optionsToRender = options;
    bubble.innerHTML = window.marked ? window.marked.parse(stripped) : stripped.replace(/\n/g, '<br>');
  } else {
    bubble.textContent = content || '';
  }

  msgEl.appendChild(avatar);
  msgEl.appendChild(bubble);
  $chatThread.appendChild(msgEl);

  if (optionsToRender.length > 0) {
    const optsEl = document.createElement('div');
    optsEl.className = 'chat-options';
    optionsToRender.forEach(optText => {
      const btn = document.createElement('button');
      btn.className = 'chat-option';
      btn.textContent = optText;
      btn.addEventListener('click', () => {
        // Disable all sibling option buttons so the choice is locked.
        optsEl.querySelectorAll('.chat-option').forEach(b => b.disabled = true);
        // Send the option text as if Sarah typed it.
        $chatInput.value = optText;
        sendMessage();
      });
      optsEl.appendChild(btn);
    });
    $chatThread.appendChild(optsEl);
  }

  $chatThread.scrollTop = $chatThread.scrollHeight;
}

async function loadThread() {
  const res = await fetch('/api/threads/' + threadId);
  if (!res.ok) {
    document.body.innerHTML = '<div style="padding:40px;text-align:center;font-family:Space Grotesk,sans-serif;">Thread not found. <a href="/threads" style="color:#e91e63;">Back to threads</a></div>';
    return;
  }
  thread = await res.json();
  $title.value   = thread.title || '';
  $summary.value = thread.summary || '';
  setStatus(thread.status || 'open');
  renderEmails();
  renderChat();
  // Auto-kickoff: if there's content but Q hasn't spoken yet, get him to take the case
  // and run the diagnostic before Sarah has to ask. The kickoff message itself
  // is sent as a hidden user message — only Q's reply renders.
  const hasContent = (thread.emails || []).length > 0 || (thread.notes || []).length > 0;
  const noQYet     = !(thread.chatHistory || []).some(m => m.role === 'assistant');
  if (hasContent && noQYet) {
    autoKickoff();
  }
}

async function autoKickoff() {
  $chatTyping.classList.add('show');
  try {
    const res = await fetch('/api/threads/' + threadId + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: "Take this case. Run the diagnostic now — call list_threads to see if anything else I have is related, read all the correspondence above, spot the timing gaps and what's wrong, name the rules in my favour, draft any immediate replies, set the chase reminders, research anything you need to with web_search. Then report back. Use 'I've' not 'I could' — completed actions, not offers. The only things you ask me are things only I can answer. You're holding this now.",
      }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'HTTP ' + res.status);
    appendChatMsg('q', json.reply);
  } catch (e) {
    appendChatMsg('q', '⚠️ Kickoff failed: ' + (e.message || 'unknown') + '. Type below and I\'ll pick it up.');
  } finally {
    $chatTyping.classList.remove('show');
    $chatInput.focus();
  }
}

function setStatus(value) {
  $statusBtn.dataset.value = value;
  $statusBtn.textContent = value.charAt(0).toUpperCase() + value.slice(1);
  $statusBtn.classList.toggle('on', value === 'open');
}

// Title / summary autosave on blur
let saveTimer;
function debounceSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveMeta, 600);
}
async function saveMeta() {
  try {
    await fetch('/api/threads/' + threadId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title:   $title.value.trim(),
        summary: $summary.value.trim(),
        status:  $statusBtn.dataset.value,
      }),
    });
  } catch { /* best effort */ }
}
$title.addEventListener('input', debounceSave);
$summary.addEventListener('input', debounceSave);

$statusBtn.addEventListener('click', () => {
  const next = $statusBtn.dataset.value === 'open' ? 'resolved' : 'open';
  setStatus(next);
  saveMeta();
});

// Add email form
$aeToggle.addEventListener('click', () => {
  $aeCard.classList.toggle('collapsed');
});
$aeCancel.addEventListener('click', () => {
  $aeCard.classList.add('collapsed');
  ['ae-from','ae-to','ae-date','ae-subject','ae-body'].forEach(id => document.getElementById(id).value = '');
});
$aeSave.addEventListener('click', async () => {
  const body = document.getElementById('ae-body').value.trim();
  if (!body) { alert('Paste the email body first.'); return; }
  $aeSave.disabled = true;
  try {
    const res = await fetch('/api/threads/' + threadId + '/emails', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type:    document.getElementById('ae-type').value,
        from:    document.getElementById('ae-from').value.trim(),
        to:      document.getElementById('ae-to').value.trim(),
        date:    document.getElementById('ae-date').value.trim(),
        subject: document.getElementById('ae-subject').value.trim(),
        body,
      }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    thread = await res.json();
    renderEmails();
    $aeCard.classList.add('collapsed');
    ['ae-from','ae-to','ae-date','ae-subject','ae-body'].forEach(id => document.getElementById(id).value = '');
  } catch (e) {
    alert('Could not add email: ' + e.message);
  } finally {
    $aeSave.disabled = false;
  }
});

// Chat with Q
async function sendMessage() {
  const text = $chatInput.value.trim();
  if (!text) return;
  appendChatMsg('user', text);
  $chatInput.value = '';
  $chatInput.style.height = 'auto';
  $chatSend.disabled = true;
  $chatTyping.classList.add('show');

  try {
    const res = await fetch('/api/threads/' + threadId + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'HTTP ' + res.status);
    appendChatMsg('q', json.reply);
  } catch (e) {
    appendChatMsg('q', '⚠️ ' + (e.message || 'Something went wrong'));
  } finally {
    $chatTyping.classList.remove('show');
    $chatSend.disabled = false;
    $chatInput.focus();
  }
}
$chatSend.addEventListener('click', sendMessage);
$chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
$chatInput.addEventListener('input', () => {
  $chatInput.style.height = 'auto';
  $chatInput.style.height = Math.min($chatInput.scrollHeight, 120) + 'px';
});

loadThread();
</script>
</body>
