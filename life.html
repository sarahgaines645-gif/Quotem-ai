<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/q-auth.js"></script>
<meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q Life — calendar, tasks, life admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e8e8;
    --text: #1a1a1a;
    --text-muted: rgba(0,0,0,0.42);
    --text-faint: rgba(0,0,0,0.26);
    --accent: #e91e63;
    --neu-raised:    10px 10px 28px #ababab, -8px -8px 20px #ffffff, inset 0 1px 0 rgba(255,255,255,0.5);
    --neu-raised-sm: 6px 6px 16px #ababab, -5px -5px 12px #ffffff;
    --neu-inset:     inset 5px 5px 14px #ababab, inset -4px -4px 10px #ffffff;
    --neu-inset-sm:  inset 3px 3px 8px #ababab, inset -2px -2px 6px #ffffff;
    --neu-inset-xs:  inset 3px 3px 8px #ababab, inset -2px -2px 6px #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 15px; line-height: 1.55;
    min-height: 100vh; padding: 20px 6px 80px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1400px; margin: 0 auto; }
  header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
  .logo-mark { display: inline-flex; align-items: baseline; }
  .logo-mark .q { font-size: 28px; font-weight: 700; line-height: 1; letter-spacing: -0.05em; color: var(--text); }
  .logo-mark .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-left: 4px; align-self: flex-end; margin-bottom: 4px; box-shadow: 0 1px 2px rgba(233,30,99,0.3); }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .tagline { font-size: 13px; color: var(--text-muted); margin-left: auto; }

  .card { background: var(--bg); border-radius: 10px; padding: 14px; box-shadow: var(--neu-raised); margin-bottom: 14px; }
  .card h2 {
    font-size: 13px; font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .card h2 .right { margin-left: auto; font-size: 12px; font-weight: 500; }

  input, textarea, select {
    width: 100%;
    border: none; outline: none;
    font-family: inherit; font-size: 14px;
    color: var(--text); background: var(--bg);
    padding: 10px 14px;
    border-radius: 10px;
    box-shadow: var(--neu-inset-sm);
    margin-bottom: 12px;
  }
  textarea { min-height: 80px; resize: vertical; line-height: 1.5; }

  button {
    border: none; cursor: pointer;
    background: var(--bg); color: var(--text);
    font-family: inherit; font-size: 13px; font-weight: 600;
    padding: 8px 16px;
    border-radius: 10px;
    box-shadow: var(--neu-raised-sm);
  }
  button:hover:not(:disabled) { color: var(--accent); }
  button:active:not(:disabled) { box-shadow: var(--neu-inset-xs); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.small { padding: 5px 10px; font-size: 11px; font-weight: 500; }
  button.danger:hover:not(:disabled) { color: #ef4444; }

  .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 6px; }

  /* Intake strip */
  .intake-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: stretch; }
  .intake-row > * { flex: 1; min-width: 160px; }
  .drop-zone {
    border-radius: 12px; box-shadow: var(--neu-inset-sm);
    padding: 14px; text-align: center; cursor: pointer;
    color: var(--text-muted); font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    min-height: 60px;
  }
  .drop-zone:hover { color: var(--text); }
  .drop-zone.over { box-shadow: var(--neu-inset); color: var(--accent); }
  .hidden-file { display: none; }
  .status { font-size: 12px; color: var(--text-muted); margin-top: 8px; min-height: 16px; }
  .status.err { color: #ef4444; }

  /* Preview list */
  .preview-empty { color: var(--text-faint); font-size: 13px; padding: 12px; text-align: center; }
  .preview-item {
    background: var(--bg);
    border-radius: 12px;
    padding: 10px 12px;
    box-shadow: var(--neu-inset-xs);
    margin-bottom: 8px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .preview-item input[type=checkbox] {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; flex: 0 0 auto; margin: 2px 0 0;
    padding: 0; background: var(--bg); border: none;
    border-radius: 5px; box-shadow: var(--neu-inset-xs);
    cursor: pointer; position: relative;
  }
  .preview-item input[type=checkbox]:checked {
    box-shadow: var(--neu-inset-sm);
  }
  .preview-item input[type=checkbox]:checked::after {
    content: '✓'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent); font-size: 12px; font-weight: 700;
    font-family: inherit;
  }
  .preview-item .body { flex: 1; min-width: 0; }
  .preview-item .body .title { font-size: 14px; font-weight: 600; }
  .preview-item .body .meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .preview-item .cat-pick {
    margin-top: 6px;
    font-size: 12px; padding: 4px 6px; border-radius: 8px;
    background: var(--bg); box-shadow: var(--neu-inset-xs);
    color: var(--text); border: 0;
  }
  /* Prep tasks nest visually under their event */
  .preview-item.prep { margin-left: 28px; }
  .preview-item.prep .body .title { font-weight: 500; }
  .preview-item.prep .body .title::before {
    content: '↳ '; color: var(--text-muted); margin-right: 2px;
  }
  .preview-group-label {
    font-size: 11px; color: var(--text-muted); margin: 12px 0 4px 0;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .pill {
    display: inline-block;
    background: var(--bg); box-shadow: var(--neu-raised-sm);
    color: var(--text-muted);
    padding: 2px 8px; border-radius: 999px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    margin-right: 6px;
  }
  .pill.event { color: #2ecc71; }
  .pill.task  { color: #f39c12; }

  /* Tag colour swatches */
  .swatches { display: inline-flex; gap: 6px; margin-left: 6px; }
  .swatch {
    width: 16px; height: 16px;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: var(--neu-raised-sm);
    border: 2px solid transparent;
  }
  .swatch.selected { border-color: var(--text); }
  .swatch.clear {
    background: var(--bg); box-shadow: var(--neu-inset-xs);
    position: relative;
  }
  .swatch.clear::after {
    content: '×'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--text-muted); line-height: 1;
  }

  /* Category pills — toggle which categories show on the calendar + tasks */
  .cat-pills {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .cat-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg); box-shadow: var(--neu-raised-sm);
    color: var(--text);
    padding: 6px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    user-select: none;
    border: 2px solid transparent;
    transition: opacity 0.15s, box-shadow 0.15s;
  }
  .cat-pill.off { opacity: 0.4; box-shadow: var(--neu-inset-xs); }
  .cat-pill .dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex: 0 0 auto;
  }
  .cat-pill .x {
    display: none; margin-left: 4px; padding: 0 4px;
    font-size: 14px; line-height: 1; color: var(--text-muted);
    border-radius: 4px;
  }
  .cat-pill:hover .x { display: inline; }
  .cat-pill .x:hover { color: #e74c3c; background: var(--bg); box-shadow: var(--neu-inset-xs); }
  .cat-pill.add { color: var(--text-muted); font-size: 16px; padding: 4px 10px; }

  /* Calendar grid */
  .cal-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .cal-head h3 { font-size: 16px; font-weight: 600; flex: 1; }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
  }
  .cal-dayname {
    font-size: 10px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    text-align: center; padding: 4px 0;
  }
  .cal-cell {
    aspect-ratio: 1; min-height: 72px; overflow: hidden;
    background: var(--bg); box-shadow: var(--neu-inset-xs);
    border-radius: 10px;
    padding: 6px; cursor: pointer;
    font-size: 11px; color: var(--text-muted);
    display: flex; flex-direction: column; gap: 3px;
  }
  .cal-cell.muted { opacity: 0.4; }
  .cal-cell.today .num { color: var(--accent); font-weight: 700; }
  .cal-cell .num { font-size: 12px; font-weight: 600; color: var(--text); }
  .cal-cell:hover { box-shadow: var(--neu-inset-sm); }
  .cal-event {
    background: var(--bg); box-shadow: var(--neu-raised-sm);
    padding: 2px 6px; border-radius: 6px;
    color: var(--text); font-size: 10px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    border-left: 3px solid var(--text-muted);
  }

  /* Task list */
  .task-row {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 6px 8px;
    background: var(--bg); border-radius: 4px;
    box-shadow: var(--neu-raised-sm);
    margin-bottom: 4px;
    border-left: 4px solid transparent;
  }
  .task-row input[type=checkbox] {
    -webkit-appearance: none; appearance: none;
    width: 20px; height: 20px; flex: 0 0 auto; margin: 2px 0 0;
    padding: 0; background: var(--bg); border: none;
    border-radius: 6px; box-shadow: var(--neu-inset-xs);
    cursor: pointer; position: relative;
  }
  .task-row input[type=checkbox]:checked {
    box-shadow: var(--neu-inset-sm);
  }
  .task-row input[type=checkbox]:checked::after {
    content: '✓'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent); font-size: 13px; font-weight: 700;
    font-family: inherit;
  }
  .task-row .body { flex: 1; min-width: 0; }
  .task-row .title { font-size: 14px; font-weight: 500; }
  .task-row.done .title { text-decoration: line-through; color: var(--text-muted); }
  .task-row .meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .task-row .colour-dot {
    width: 10px; height: 10px; border-radius: 50%;
    display: inline-block; margin-right: 4px; vertical-align: middle;
  }

  /* Modal */
  /* Modal overlay — neumorphic pages use NO overlay (no dark tint, no blur).
     Focus comes from the modal's own raised shadow against the live page.
     The .modal-bg element is kept transparent so click-outside-to-dismiss
     still works. */
  .modal-bg {
    position: fixed; inset: 0;
    background: transparent;
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg); border-radius: 18px;
    box-shadow: var(--neu-raised);
    padding: 22px; max-width: 480px; width: 100%;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h3 {
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 14px;
  }
  .modal label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 6px; margin-top: 10px;
  }
  .modal .row { display: flex; gap: 8px; }
  .modal .row > * { flex: 1; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .modal-actions button { flex: 1; }

  .back-link { display: inline-block; margin-top: 32px; font-size: 12px; color: var(--text-muted); text-decoration: none; }
  .back-link:hover { color: var(--text); }

  /* ── 2-col layout ─────────────────────────────────── */
  .main-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 18px;
    align-items: start;
  }
  .side-col { display: flex; flex-direction: column; }
  .side-col .card { margin-bottom: 18px; }
  @media (max-width: 680px) { .main-grid { grid-template-columns: 1fr; } }

  /* Black section headings — override the muted uppercase default */
  .card h2 { color: var(--text); text-transform: none; letter-spacing: 0; font-size: 15px; }

  /* Compact drop zone row in sidebar */
  .drop-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .drop-sm {
    flex: 1; padding: 8px; text-align: center; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; min-height: 38px;
    border-radius: 10px; box-shadow: var(--neu-inset-xs);
    color: var(--text-muted);
  }
  .drop-sm:hover { color: var(--text); }
  .drop-sm.over { box-shadow: var(--neu-inset); color: var(--accent); }

  /* Collapse toggle button */
  .collapse-btn {
    background: none; box-shadow: none;
    padding: 0 6px; font-size: 13px; color: var(--text-muted);
    display: inline-block; margin-left: 2px;
    vertical-align: middle;
  }
  .body-collapsed { display: none; }

  /* Delete button on rows — visible on row hover */
  .row-del {
    flex: 0 0 auto; background: none; box-shadow: none;
    color: transparent; font-size: 16px; line-height: 1;
    padding: 2px 4px;
  }
  .task-row:hover .row-del { color: var(--text-muted); }
  .row-del:hover { color: #ef4444 !important; }

  /* Collapsible task/reminder rows */
  .title-row {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
  }
  .title-row .title { flex: 1; font-size: 14px; font-weight: 500; }
  .row-expand { color: var(--text-muted); font-size: 11px; flex: 0 0 auto; user-select: none; }
  .row-detail { margin-top: 6px; }
  .row-detail .meta { font-size: 11px; color: var(--text-muted); line-height: 1.5; }
  .row-detail .edit-link { margin-top: 6px; font-size: 11px; }

  /* Q coach card — draggable, matches writer.html / plotter.html */
  .coach-card {
    position: fixed; right: 28px; top: 50%; transform: translateY(-50%);
    width: 196px;
    background: var(--bg);
    border-radius: 18px;
    box-shadow: 10px 10px 28px #ababab, -8px -8px 20px #ffffff;
    padding: 14px 16px;
    display: flex; flex-direction: column;
    cursor: default; z-index: 200;
  }
  .coach-card .q-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 6px;
  }
  .coach-card .q-logo {
    font-weight: 700; font-size: 20px; color: var(--text); line-height: 1;
  }
  .coach-card .q-logo .dot { color: var(--accent); }
  .coach-card .q-close {
    background: none; box-shadow: none; padding: 0 2px;
    font-size: 17px; line-height: 1; color: var(--text-faint);
    cursor: pointer; border: none; font-family: inherit;
  }
  .coach-card .q-close:hover { color: var(--text); }
  .coach-card .q-msg {
    font-size: 12px; color: var(--text-muted); line-height: 1.4;
    max-height: 160px; overflow-y: auto;
    margin-bottom: 10px; flex: 1;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  .coach-card .q-msg::-webkit-scrollbar { display: none; }
  .coach-card .q-msg p { margin: 0 0 4px; }
  .coach-card .q-msg p.u-line { color: var(--text); text-align: right; }
  .coach-card .q-msg p.thinking { font-style: italic; color: var(--text-faint); }
  .coach-card input.coach-input {
    width: 100%; border: none; outline: none;
    background: transparent; box-shadow: none; border-radius: 0;
    padding: 4px 0 5px;
    border-bottom: 1px solid rgba(0,0,0,0.10);
    font-family: inherit; font-size: 12px; color: var(--text);
    margin-bottom: 0;
  }
  .coach-card input.coach-input:focus { border-bottom-color: var(--accent); }
  .coach-card input.coach-input::placeholder { color: var(--text-faint); font-style: italic; }
  /* Thin tab on right edge when card is closed */
  .coach-tab {
    position: fixed; right: 0; top: 50%; transform: translateY(-50%);
    width: 22px; height: 56px; border-radius: 8px 0 0 8px;
    background: var(--bg); box-shadow: var(--neu-raised-sm);
    border: none; cursor: pointer; z-index: 200;
    font-family: inherit; font-size: 11px; font-weight: 700; color: var(--text);
    writing-mode: vertical-rl; display: none;
  }

  /* Colour picker popover on category dots */
  .dot-picker {
    position: absolute; top: calc(100% + 6px); left: 0;
    background: var(--bg); box-shadow: var(--neu-raised);
    border-radius: 10px; padding: 8px;
    display: flex; flex-wrap: wrap; gap: 6px;
    z-index: 400; width: 154px;
  }
  .dot-picker .dp-sw {
    width: 18px; height: 18px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
    box-shadow: var(--neu-raised-sm);
    flex: 0 0 auto;
  }
  .dot-picker .dp-sw:hover { border-color: var(--text); }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <a href="/tools" style="text-decoration: none;">
      <span class="logo-mark"><span class="q">Q</span><span class="dot"></span></span>
    </a>
    <h1>Life</h1>
    <span class="tagline">Calendar · Tasks · Photos in, dates out</span>
  </header>

  <!-- CATEGORY PILLS — full width above the grid -->
  <div class="card">
    <h2>Show <span class="right" style="font-size: 11px; color: var(--text-muted); font-weight: 400;">Click to hide · click dot to recolour · hover to delete</span></h2>
    <div class="cat-pills" id="cat-pills"></div>
  </div>

  <!-- MAIN 2-COL GRID -->
  <div class="main-grid">

    <!-- LEFT 2/3 — Calendar -->
    <div class="cal-col">
      <div class="card">
        <div class="cal-head">
          <button class="small" id="cal-prev">‹</button>
          <h3 id="cal-title">Month</h3>
          <button class="small" id="cal-today">Today</button>
          <button class="small" id="cal-next">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>

    <!-- RIGHT 1/3 — Sidebar -->
    <div class="side-col">

      <!-- Compact intake -->
      <div class="card">
        <h2>Add anything <span class="right"><a href="/about" style="color: var(--text-muted); text-decoration: none; font-size: 12px; font-weight: 400;">About you →</a></span></h2>
        <div class="drop-row">
          <div class="drop-sm" id="drop-photo">📷 Photo</div>
          <div class="drop-sm" id="drop-file">📎 File</div>
        </div>
        <textarea id="paste-text" placeholder="…or paste a school letter, email, or note here." style="min-height: 70px; margin-bottom: 8px;"></textarea>
        <input type="text" id="intake-note" style="display:none">
        <div class="actions">
          <button id="extract-btn">Read it</button>
          <button id="manual-event" class="small">+ Event</button>
          <button id="manual-task"  class="small">+ Task</button>
        </div>
        <div class="status" id="extract-status"></div>
        <input type="file" id="photo-input" class="hidden-file" accept="image/*" capture="environment">
        <input type="file" id="file-input"  class="hidden-file" accept=".pdf,.doc,.docx,image/*">
      </div>

      <!-- PREVIEW (extracted, not yet saved) -->
      <div class="card" id="preview-card" style="display: none;">
        <h2>Found <span class="right"><button id="add-batch-btn" class="small">Add ticked</button> <button id="clear-preview" class="small">Clear</button></span></h2>
        <div id="preview-list"></div>
      </div>

      <!-- REMINDERS (collapsible) -->
      <div class="card">
        <h2>Reminders
          <button class="collapse-btn" id="reminder-toggle">▾</button>
          <span class="right" style="font-size: 11px; color: var(--text-muted); font-weight: 400;">Before events</span>
        </h2>
        <div id="reminder-body">
          <div id="reminder-list"></div>
        </div>
      </div>

      <!-- TASKS (collapsible) -->
      <div class="card">
        <h2>Tasks
          <button class="collapse-btn" id="task-toggle">▾</button>
          <span class="right">
            <button class="small" id="task-filter-open">Open</button>
          </span>
        </h2>
        <div id="task-body">
          <div id="task-list"></div>
        </div>
      </div>

    </div><!-- end side-col -->
  </div><!-- end main-grid -->

  <a class="back-link" href="/tools">← All tools</a>
</div>

<!-- Q coach card -->
<div class="coach-card" id="coach-card">
  <div class="q-header">
    <div class="q-logo">Q<span class="dot">.</span></div>
    <button class="q-close" id="q-close" title="Close">×</button>
  </div>
  <div class="q-msg" id="coach-msg"></div>
  <input class="coach-input" id="coach-input" type="text" placeholder="Ask Q…" autocomplete="off" />
</div>
<button class="coach-tab" id="coach-tab" title="Open Q">Q</button>

<!-- Undo toast -->
<div id="undo-toast" style="
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
  background:var(--bg);box-shadow:var(--neu-raised-sm);
  padding:10px 18px;border-radius:12px;
  display:none;align-items:center;gap:14px;
  font-size:13px;z-index:300;white-space:nowrap;
">
  <span id="undo-toast-msg"></span>
  <button id="undo-toast-btn" class="small">Undo</button>
</div>

<!-- Edit modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-title">New item</h3>
    <label>Title</label>
    <input type="text" id="m-title">
    <div class="row">
      <div>
        <label id="m-date-label">Date</label>
        <input type="date" id="m-date">
      </div>
      <div id="m-time-wrap">
        <label>Time</label>
        <input type="time" id="m-time">
      </div>
      <div id="m-priority-wrap" style="display: none;">
        <label>Priority</label>
        <select id="m-priority">
          <option value="low">Low</option>
          <option value="med" selected>Med</option>
          <option value="high">High</option>
        </select>
      </div>
    </div>
    <label id="m-location-label">Location</label>
    <input type="text" id="m-location">
    <label>Notes</label>
    <textarea id="m-notes"></textarea>
    <label>Category</label>
    <select id="m-category">
      <option value="">— Uncategorised —</option>
    </select>
    <label>Tag colour <span style="font-size: 11px; color: var(--text-muted); font-weight: 400;">(overrides category colour)</span></label>
    <div class="swatches" id="m-swatches"></div>
    <div class="modal-actions">
      <button id="m-save">Save</button>
      <button id="m-delete" class="danger" style="display: none;">Delete</button>
      <button id="m-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Add-category modal -->
<div class="modal-bg" id="cat-modal">
  <div class="modal">
    <h3>New category</h3>
    <label>Name</label>
    <input type="text" id="cat-name" placeholder="e.g. Fitness, Voiceharp, Mum">
    <label>Colour</label>
    <div class="swatches" id="cat-swatches"></div>
    <div class="modal-actions">
      <button id="cat-save">Save</button>
      <button id="cat-cancel">Cancel</button>
    </div>
  </div>
</div>

<script>
const TAG_COLOURS = [
  '#a78bfa', '#635bff', '#4285f4', '#60a5fa', '#06b6d4', '#34d399', '#34a853',
  '#2ecc71', '#fbbf24', '#f39c12', '#d97757', '#e74c3c', '#f87171', '#95a5a6',
];
const $ = (id) => document.getElementById(id);

const state = {
  events: [],
  tasks: [],
  categories: [],
  // Set of slugs the user has hidden. Empty = everything shown.
  // Empty-string slug '' represents "Uncategorised".
  hiddenCategories: loadHiddenCategories(),
  preview: { events: [], tasks: [] },
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  taskFilter: 'open',
  modal: { mode: null, kind: null, item: null, color: null, category: null },
  catModal: { color: TAG_COLOURS[0] },
};

function loadHiddenCategories() {
  try {
    const raw = localStorage.getItem('life:hiddenCategories');
    return new Set(raw ? JSON.parse(raw) : []);
  } catch { return new Set(); }
}
function saveHiddenCategories() {
  try { localStorage.setItem('life:hiddenCategories', JSON.stringify([...state.hiddenCategories])); } catch {}
}
function isVisible(item) {
  const slug = item.category || '';
  return !state.hiddenCategories.has(slug);
}
function findCategory(slug) {
  return state.categories.find(c => c.slug === slug) || null;
}

function fmtDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y.slice(2)}`;
}

function setStatus(text, isErr = false) {
  const el = $('extract-status');
  el.textContent = text || '';
  el.classList.toggle('err', isErr);
}

// ── Load + render ───────────────────────────────────────────────

async function loadEvents() {
  const r = await fetch('/life/events');
  state.events = await r.json();
  renderCalendar();
}
async function loadTasks() {
  const r = await fetch('/life/tasks');
  state.tasks = await r.json();
  renderTasks();
}
async function loadCategories() {
  try {
    const r = await fetch('/life/categories');
    const data = await r.json();
    state.categories = Array.isArray(data) ? data : [];
  } catch { state.categories = []; }
  renderCategoryPills();
}

function renderCategoryPills() {
  const wrap = $('cat-pills');
  wrap.innerHTML = '';

  // One pill per user category…
  state.categories.forEach(cat => wrap.appendChild(buildCatPill(cat)));

  // …plus an "Uncategorised" toggle (slug = '') so things tagged with
  // nothing can be hidden too.
  wrap.appendChild(buildCatPill({ slug: '', name: 'Uncategorised', color: '#95a5a6' }, { undeletable: true }));

  const add = document.createElement('span');
  add.className = 'cat-pill add';
  add.textContent = '+ Add';
  add.addEventListener('click', openCategoryModal);
  wrap.appendChild(add);
}

function buildCatPill(cat, opts = {}) {
  const pill = document.createElement('span');
  pill.style.position = 'relative';
  const hidden = state.hiddenCategories.has(cat.slug);
  pill.className = 'cat-pill' + (hidden ? ' off' : '');
  pill.dataset.slug = cat.slug;

  const dot = document.createElement('span');
  dot.className = 'dot';
  dot.style.background = cat.color;
  if (!opts.undeletable) {
    dot.title = 'Click to recolour';
    dot.style.cursor = 'pointer';
    dot.addEventListener('click', (e) => {
      e.stopPropagation();
      openDotPicker(dot, cat);
    });
  }

  const label = document.createElement('span');
  label.textContent = cat.name;

  pill.appendChild(dot);
  pill.appendChild(label);
  pill.addEventListener('click', (e) => {
    if (e.target === dot || e.target.classList.contains('x')) return;
    toggleCategory(cat.slug);
  });
  if (!opts.undeletable) {
    const x = document.createElement('span');
    x.className = 'x';
    x.textContent = '×';
    x.title = 'Delete category';
    x.addEventListener('click', (e) => { e.stopPropagation(); deleteCategoryPrompt(cat); });
    pill.appendChild(x);
  }
  return pill;
}

function openDotPicker(dotEl, cat) {
  // Close any open picker first
  document.querySelectorAll('.dot-picker').forEach(p => p.remove());

  const picker = document.createElement('div');
  picker.className = 'dot-picker';
  TAG_COLOURS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'dp-sw';
    sw.style.background = c;
    if (c === cat.color) sw.style.borderColor = 'var(--text)';
    sw.addEventListener('click', async (e) => {
      e.stopPropagation();
      picker.remove();
      await recolourCategory(cat, c);
    });
    picker.appendChild(sw);
  });
  dotEl.parentElement.appendChild(picker);

  // Click outside closes
  setTimeout(() => {
    document.addEventListener('click', () => picker.remove(), { once: true });
  }, 0);
}

async function recolourCategory(cat, newColor) {
  const r = await fetch('/life/categories/' + cat.slug, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ color: newColor }),
  });
  if (!r.ok) return;
  cat.color = newColor;
  const idx = state.categories.findIndex(c => c.slug === cat.slug);
  if (idx !== -1) state.categories[idx].color = newColor;
  renderCategoryPills();
  renderCalendar();
  renderTasks();
}

function toggleCategory(slug) {
  if (state.hiddenCategories.has(slug)) state.hiddenCategories.delete(slug);
  else state.hiddenCategories.add(slug);
  saveHiddenCategories();
  renderCategoryPills();
  renderCalendar();
  renderTasks();
}

async function deleteCategoryPrompt(cat) {
  const inUse = state.events.filter(e => e.category === cat.slug).length
              + state.tasks.filter(t  => t.category === cat.slug).length;
  const msg = inUse > 0
    ? `Delete "${cat.name}"? ${inUse} item${inUse === 1 ? '' : 's'} still tagged with it will become uncategorised.`
    : `Delete "${cat.name}"?`;
  if (!confirm(msg)) return;
  const r = await fetch('/life/categories/' + encodeURIComponent(cat.slug), { method: 'DELETE' });
  if (!r.ok) { setStatus('Could not delete category.', true); return; }
  state.hiddenCategories.delete(cat.slug);
  saveHiddenCategories();
  await loadCategories();
}

function renderCalendar() {
  const grid = $('cal-grid');
  grid.innerHTML = '';
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  $('cal-title').textContent = `${monthNames[state.calMonth]} ${state.calYear}`;

  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dayname';
    el.textContent = d;
    grid.appendChild(el);
  });

  const first = new Date(state.calYear, state.calMonth, 1);
  let leading = first.getDay() - 1;
  if (leading < 0) leading = 6;
  const daysInMonth = new Date(state.calYear, state.calMonth + 1, 0).getDate();
  const todayIso = new Date().toISOString().slice(0, 10);

  // Leading muted cells
  const prevMonth = new Date(state.calYear, state.calMonth, 0).getDate();
  for (let i = leading - 1; i >= 0; i--) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell muted';
    cell.innerHTML = `<div class="num">${prevMonth - i}</div>`;
    grid.appendChild(cell);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${state.calYear}-${String(state.calMonth + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (iso === todayIso ? ' today' : '');
    cell.dataset.date = iso;
    cell.innerHTML = `<div class="num">${d}</div>`;
    const onDay = state.events.filter(e => e.date === iso && isVisible(e));
    onDay.slice(0, 3).forEach(e => {
      const tag = document.createElement('div');
      tag.className = 'cal-event';
      const cat = findCategory(e.category);
      tag.style.borderLeftColor = e.color || (cat && cat.color) || '#95a5a6';
      tag.textContent = (e.time ? e.time + ' ' : '') + e.title;
      tag.addEventListener('click', (ev) => { ev.stopPropagation(); openEdit('event', e); });
      cell.appendChild(tag);
    });
    if (onDay.length > 3) {
      const more = document.createElement('div');
      more.style.fontSize = '10px';
      more.style.color = 'var(--text-muted)';
      more.textContent = `+${onDay.length - 3} more`;
      cell.appendChild(more);
    }
    cell.addEventListener('click', () => openNew('event', iso));
    grid.appendChild(cell);
  }

  // Trailing muted cells
  const total = leading + daysInMonth;
  const trailing = (7 - (total % 7)) % 7;
  for (let i = 1; i <= trailing; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell muted';
    cell.innerHTML = `<div class="num">${i}</div>`;
    grid.appendChild(cell);
  }
}

function renderTasks() {
  // Reminders = tasks with prepFor (linked to an event). Tasks = standalone.
  const reminders = state.tasks.filter(t => t.prepFor && !t.done && isVisible(t));
  const tasks = state.tasks.filter(t => {
    if (!t.prepFor) {
      if (state.taskFilter === 'done' ? !t.done : t.done) return false;
      return isVisible(t);
    }
    return false;
  });
  renderTaskGroup($('reminder-list'), reminders, 'reminder');
  renderTaskGroup($('task-list'), tasks, 'task');
  $('task-filter-open').style.opacity = '1';
}

function renderTaskGroup(list, items, type) {
  list.innerHTML = '';
  if (items.length === 0) {
    const empty = type === 'reminder'
      ? 'No upcoming reminders.'
      : (state.taskFilter === 'done' ? 'Nothing ticked off yet.' : 'No open tasks. Nice.');
    list.innerHTML = `<div class="preview-empty">${empty}</div>`;
    return;
  }
  items.forEach(t => {
    const row = document.createElement('div');
    row.className = 'task-row' + (t.done ? ' done' : '');
    const cat = findCategory(t.category);
    const rowColor = t.color || (cat && cat.color) || '#95a5a6';
    row.style.borderLeftColor = rowColor;

    // Checkbox
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = !!t.done;
    cb.addEventListener('change', () => toggleTaskDone(t));
    row.appendChild(cb);

    // Body — title row + collapsible detail
    const body = document.createElement('div');
    body.className = 'body';

    const meta = [];
    if (t.due) meta.push('Due ' + fmtDate(t.due));
    if (t.prepFor) meta.push('For: ' + escape(t.prepFor));
    if (t.priority === 'high') meta.push('High priority');
    if (t.priority === 'low')  meta.push('Low priority');
    if (t.notes) meta.push(escape(t.notes));
    const hasDetail = meta.length > 0;

    const titleRow = document.createElement('div');
    titleRow.className = 'title-row';
    const titleEl = document.createElement('span');
    titleEl.className = 'title';
    titleEl.textContent = t.title;
    titleRow.appendChild(titleEl);
    if (hasDetail) {
      const exp = document.createElement('span');
      exp.className = 'row-expand';
      exp.textContent = '▾';
      titleRow.appendChild(exp);
    }
    body.appendChild(titleRow);

    const detail = document.createElement('div');
    detail.className = 'row-detail';
    detail.style.display = 'none';
    if (hasDetail) {
      detail.innerHTML = `<div class="meta">${meta.join(' · ')}</div>`;
    }
    const editLink = document.createElement('button');
    editLink.className = 'small edit-link';
    editLink.textContent = 'Edit';
    editLink.addEventListener('click', (e) => { e.stopPropagation(); openEdit('task', t); });
    detail.appendChild(editLink);
    body.appendChild(detail);

    if (hasDetail) {
      titleRow.addEventListener('click', () => {
        const open = detail.style.display === 'none';
        detail.style.display = open ? 'block' : 'none';
        titleRow.querySelector('.row-expand').textContent = open ? '▴' : '▾';
      });
    }

    row.appendChild(body);

    // Delete — uses undo toast instead of confirm
    const delBtn = document.createElement('button');
    delBtn.className = 'row-del';
    delBtn.textContent = '×';
    delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteTaskItem(t); });
    row.appendChild(delBtn);

    list.appendChild(row);
  });
}

async function deleteTaskItem(t) {
  const r = await fetch('/life/tasks/' + t.id, { method: 'DELETE' });
  if (!r.ok) return;
  await loadTasks();
  showUndoToast(`"${t.title}" deleted`, async () => {
    await fetch('/life/tasks', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(t),
    });
    await loadTasks();
  });
}

function escape(s) {
  return String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);
}

// ── Intake ──────────────────────────────────────────────────────

$('extract-btn').addEventListener('click', async () => {
  const text = $('paste-text').value.trim();
  if (!text) { setStatus('Paste some text first.', true); return; }
  setStatus('Reading…');
  try {
    const note = $('intake-note').value.trim();
    const r = await fetch('/life/extract', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, note, source: 'paste' }),
    });
    const data = await r.json();
    if (data.error) { setStatus(data.error, true); return; }
    showPreview(data);
    setStatus(`Found ${data.events.length} event${data.events.length === 1 ? '' : 's'} and ${data.tasks.length} task${data.tasks.length === 1 ? '' : 's'}.`);
  } catch (e) { setStatus(e.message, true); }
});

$('drop-photo').addEventListener('click', () => $('photo-input').click());
$('drop-file').addEventListener('click', () => $('file-input').click());

['dragover','dragenter'].forEach(ev => {
  ['drop-photo','drop-file'].forEach(id => {
    $(id).addEventListener(ev, (e) => { e.preventDefault(); $(id).classList.add('over'); });
  });
});
['dragleave','drop'].forEach(ev => {
  ['drop-photo','drop-file'].forEach(id => {
    $(id).addEventListener(ev, (e) => { e.preventDefault(); $(id).classList.remove('over'); });
  });
});
$('drop-photo').addEventListener('drop', (e) => handlePhoto(e.dataTransfer.files[0]));
$('drop-file').addEventListener('drop', (e) => handleFile(e.dataTransfer.files[0]));
$('photo-input').addEventListener('change', (e) => handlePhoto(e.target.files[0]));
$('file-input').addEventListener('change', (e) => handleFile(e.target.files[0]));

async function handlePhoto(file) {
  if (!file) return;
  if (!file.type.startsWith('image/')) { setStatus('Photo needs to be an image.', true); return; }
  setStatus('Reading photo…');
  const dataUrl = await fileToDataUrl(file);
  try {
    const r = await fetch('/life/extract-photo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dataUrl, note: $('intake-note').value.trim(), source: 'photo' }),
    });
    const data = await r.json();
    if (data.error) { setStatus(data.error, true); return; }
    showPreview(data);
    setStatus(`Found ${data.events.length} event${data.events.length === 1 ? '' : 's'} and ${data.tasks.length} task${data.tasks.length === 1 ? '' : 's'}.`);
  } catch (e) { setStatus(e.message, true); }
}

async function handleFile(file) {
  if (!file) return;
  if (file.type.startsWith('image/')) return handlePhoto(file);
  setStatus('Reading document…');
  try {
    const dataUrl = await fileToDataUrl(file);
    const r = await fetch('/extract-text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dataUrl, name: file.name }),
    });
    const out = await r.json();
    const text = out?.text;
    if (!text) { setStatus(out.error || 'Could not read that file.', true); return; }
    $('paste-text').value = text;
    setStatus('Document read. Click "Read it" to extract.');
  } catch (e) { setStatus(e.message, true); }
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function showPreview({ events, tasks }) {
  state.preview = { events, tasks };
  const list = $('preview-list');
  list.innerHTML = '';
  if (events.length === 0 && tasks.length === 0) {
    list.innerHTML = '<div class="preview-empty">Nothing date-shaped in there.</div>';
    $('preview-card').style.display = 'block';
    return;
  }

  // Index tasks by the event title they prep for so we can nest them.
  const taskIdxByEventTitle = new Map();
  const standaloneTaskIdxs = [];
  tasks.forEach((t, i) => {
    const key = (t.prepFor || '').trim().toLowerCase();
    if (key) {
      if (!taskIdxByEventTitle.has(key)) taskIdxByEventTitle.set(key, []);
      taskIdxByEventTitle.get(key).push(i);
    } else {
      standaloneTaskIdxs.push(i);
    }
  });

  events.forEach((e, i) => {
    list.appendChild(previewItem('event', e, i));
    const key = (e.title || '').trim().toLowerCase();
    const prepIdxs = taskIdxByEventTitle.get(key) || [];
    prepIdxs.forEach(ti => list.appendChild(previewItem('task', tasks[ti], ti, { prep: true })));
    taskIdxByEventTitle.delete(key);
  });

  // Any prep tasks whose event didn't make it into the events array — render flat.
  const orphanTaskIdxs = [];
  taskIdxByEventTitle.forEach(idxs => idxs.forEach(i => orphanTaskIdxs.push(i)));
  const flatTaskIdxs = [...standaloneTaskIdxs, ...orphanTaskIdxs];
  if (flatTaskIdxs.length > 0 && events.length > 0) {
    const label = document.createElement('div');
    label.className = 'preview-group-label';
    label.textContent = 'Other tasks';
    list.appendChild(label);
  }
  flatTaskIdxs.forEach(ti => list.appendChild(previewItem('task', tasks[ti], ti)));

  $('preview-card').style.display = 'block';
}

function previewItem(kind, item, idx, opts = {}) {
  const row = document.createElement('div');
  row.className = 'preview-item' + (opts.prep ? ' prep' : '');
  const meta = kind === 'event'
    ? `${fmtDate(item.date)}${item.time ? ' · ' + item.time : ''}${item.location ? ' · ' + item.location : ''}`
    : `${item.due ? 'Due ' + fmtDate(item.due) + ' · ' : ''}${item.priority}`;

  const checkbox = document.createElement('input');
  checkbox.type = 'checkbox';
  checkbox.checked = true;
  checkbox.dataset.kind = kind;
  checkbox.dataset.idx = idx;

  const body = document.createElement('div');
  body.className = 'body';
  body.innerHTML = `
    <div class="title"><span class="pill ${kind}">${kind}</span>${escape(item.title)}</div>
    <div class="meta">${escape(meta)}${item.notes ? ' · ' + escape(item.notes) : ''}</div>
  `;

  // Category picker — defaults to whatever the extractor guessed (none, today).
  const sel = document.createElement('select');
  sel.className = 'cat-pick';
  sel.innerHTML = '<option value="">— Uncategorised —</option>';
  state.categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.slug;
    opt.textContent = c.name;
    if (c.slug === item.category) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => { item.category = sel.value || null; });
  body.appendChild(sel);

  row.appendChild(checkbox);
  row.appendChild(body);
  return row;
}

$('add-batch-btn').addEventListener('click', async () => {
  const ticked = Array.from(document.querySelectorAll('#preview-list input[type=checkbox]:checked'));
  const events = [], tasks = [];
  ticked.forEach(cb => {
    const idx = parseInt(cb.dataset.idx);
    if (cb.dataset.kind === 'event') events.push(state.preview.events[idx]);
    else tasks.push(state.preview.tasks[idx]);
  });
  if (events.length === 0 && tasks.length === 0) { setStatus('Tick at least one.', true); return; }
  setStatus('Saving…');
  await fetch('/life/batch', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ events, tasks }),
  });
  $('preview-card').style.display = 'none';
  $('paste-text').value = '';
  state.preview = { events: [], tasks: [] };
  await Promise.all([loadEvents(), loadTasks()]);

  // Jump the calendar to the month of the earliest saved event so it's visible immediately.
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  let jumpMsg = '';
  if (events.length > 0) {
    const earliest = events.map(e => e.date).filter(Boolean).sort()[0];
    if (earliest) {
      const parts = earliest.split('-');
      const y = parseInt(parts[0], 10);
      const m = parseInt(parts[1], 10) - 1;
      if (y !== state.calYear || m !== state.calMonth) {
        state.calYear = y;
        state.calMonth = m;
        renderCalendar();
        jumpMsg = ` — showing ${monthNames[m]}`;
      }
    }
  }
  setStatus(`Saved ${events.length + tasks.length} item${events.length + tasks.length === 1 ? '' : 's'}${jumpMsg}.`);
});

$('clear-preview').addEventListener('click', () => {
  $('preview-card').style.display = 'none';
  state.preview = { events: [], tasks: [] };
});

// ── Calendar nav ────────────────────────────────────────────────

$('cal-prev').addEventListener('click', () => {
  state.calMonth--;
  if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
  renderCalendar();
});
$('cal-next').addEventListener('click', () => {
  state.calMonth++;
  if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
  renderCalendar();
});
$('cal-today').addEventListener('click', () => {
  state.calYear = new Date().getFullYear();
  state.calMonth = new Date().getMonth();
  renderCalendar();
});

// ── Task filter ─────────────────────────────────────────────────

$('task-filter-open').addEventListener('click', () => { state.taskFilter = 'open'; renderTasks(); });

async function toggleTaskDone(t) {
  const r = await fetch('/life/tasks/' + t.id, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ done: !t.done }),
  });
  if (r.ok) await loadTasks();
}

// ── Modal (new + edit) ──────────────────────────────────────────

$('manual-event').addEventListener('click', () => openNew('event', new Date().toISOString().slice(0,10)));
$('manual-task').addEventListener('click',  () => openNew('task'));

function openNew(kind, dateIso) {
  state.modal = { mode: 'new', kind, item: null, color: null, category: null };
  $('modal-title').textContent = kind === 'event' ? 'New event' : 'New task';
  $('m-title').value = '';
  $('m-date').value = dateIso || '';
  $('m-time').value = '';
  $('m-location').value = '';
  $('m-notes').value = '';
  $('m-priority').value = 'med';
  populateCategorySelect(null);
  setSwatches(null);
  showModalFor(kind);
  $('m-delete').style.display = 'none';
  $('modal').classList.add('show');
  $('m-title').focus();
}

function openEdit(kind, item) {
  state.modal = { mode: 'edit', kind, item, color: item.color || null, category: item.category || null };
  $('modal-title').textContent = (kind === 'event' ? 'Edit event' : 'Edit task');
  $('m-title').value = item.title;
  $('m-date').value = kind === 'event' ? item.date : (item.due || '');
  $('m-time').value = kind === 'event' ? (item.time || '') : '';
  $('m-location').value = kind === 'event' ? (item.location || '') : '';
  $('m-notes').value = item.notes || '';
  if (kind === 'task') $('m-priority').value = item.priority || 'med';
  populateCategorySelect(item.category || null);
  setSwatches(item.color || null);
  showModalFor(kind);
  $('m-delete').style.display = 'inline-block';
  $('modal').classList.add('show');
  $('m-title').focus();
}

function populateCategorySelect(currentSlug) {
  const sel = $('m-category');
  sel.innerHTML = '<option value="">— Uncategorised —</option>';
  state.categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.slug;
    opt.textContent = c.name;
    if (c.slug === currentSlug) opt.selected = true;
    sel.appendChild(opt);
  });
  state.modal.category = currentSlug || null;
}
document.addEventListener('change', (e) => {
  if (e.target && e.target.id === 'm-category') {
    state.modal.category = e.target.value || null;
  }
});

function showModalFor(kind) {
  if (kind === 'event') {
    $('m-date-label').textContent = 'Date';
    $('m-time-wrap').style.display = 'block';
    $('m-priority-wrap').style.display = 'none';
    $('m-location-label').style.display = 'block';
    $('m-location').style.display = 'block';
  } else {
    $('m-date-label').textContent = 'Due (optional)';
    $('m-time-wrap').style.display = 'none';
    $('m-priority-wrap').style.display = 'block';
    $('m-location-label').style.display = 'none';
    $('m-location').style.display = 'none';
  }
}

function setSwatches(currentColor) {
  const wrap = $('m-swatches');
  wrap.innerHTML = '';
  const clear = document.createElement('div');
  clear.className = 'swatch clear' + (currentColor ? '' : ' selected');
  clear.addEventListener('click', () => { state.modal.color = null; setSwatches(null); });
  wrap.appendChild(clear);
  TAG_COLOURS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (currentColor === c ? ' selected' : '');
    sw.style.background = c;
    sw.addEventListener('click', () => { state.modal.color = c; setSwatches(c); });
    wrap.appendChild(sw);
  });
  state.modal.color = currentColor;
}

$('m-cancel').addEventListener('click', () => $('modal').classList.remove('show'));
$('modal').addEventListener('click', (e) => { if (e.target.id === 'modal') $('modal').classList.remove('show'); });

$('m-save').addEventListener('click', async () => {
  const title = $('m-title').value.trim();
  if (!title) return;
  const dateVal = $('m-date').value;
  const { mode, kind, item, color, category } = state.modal;

  if (kind === 'event') {
    if (!dateVal) { alert('Date is required for an event.'); return; }
    const payload = {
      title, date: dateVal,
      time: $('m-time').value || null,
      location: $('m-location').value.trim() || null,
      notes: $('m-notes').value.trim() || null,
      color,
      category,
    };
    if (mode === 'new') await fetch('/life/events', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    else await fetch('/life/events/' + item.id, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    await loadEvents();
  } else {
    const payload = {
      title,
      due: dateVal || null,
      priority: $('m-priority').value,
      notes: $('m-notes').value.trim() || null,
      color,
      category,
    };
    if (mode === 'new') await fetch('/life/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    else await fetch('/life/tasks/' + item.id, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    await loadTasks();
  }
  $('modal').classList.remove('show');
});

$('m-delete').addEventListener('click', async () => {
  const { kind, item } = state.modal;
  if (!confirm(`Delete this ${kind}?`)) return;
  const path = kind === 'event' ? '/life/events/' : '/life/tasks/';
  await fetch(path + item.id, { method: 'DELETE' });
  $('modal').classList.remove('show');
  if (kind === 'event') await loadEvents(); else await loadTasks();
});


// ── Add-category modal ──────────────────────────────────────────

function openCategoryModal() {
  state.catModal.color = TAG_COLOURS[0];
  $('cat-name').value = '';
  renderCatSwatches();
  $('cat-modal').classList.add('show');
  setTimeout(() => $('cat-name').focus(), 30);
}

function renderCatSwatches() {
  const wrap = $('cat-swatches');
  wrap.innerHTML = '';
  TAG_COLOURS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (state.catModal.color === c ? ' selected' : '');
    sw.style.background = c;
    sw.addEventListener('click', () => { state.catModal.color = c; renderCatSwatches(); });
    wrap.appendChild(sw);
  });
}

$('cat-cancel').addEventListener('click', () => $('cat-modal').classList.remove('show'));
$('cat-modal').addEventListener('click', (e) => { if (e.target.id === 'cat-modal') $('cat-modal').classList.remove('show'); });

$('cat-save').addEventListener('click', async () => {
  const name = $('cat-name').value.trim();
  if (!name) { setStatus('Give it a name first.', true); return; }
  const r = await fetch('/life/categories', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, color: state.catModal.color }),
  });
  const data = await r.json();
  if (!r.ok) { setStatus(data.error || 'Could not add category.', true); return; }
  $('cat-modal').classList.remove('show');
  await loadCategories();
});

// ── Undo toast ──────────────────────────────────────────────────

let undoTimer = null;
function showUndoToast(msg, undoFn) {
  clearTimeout(undoTimer);
  const toast = $('undo-toast');
  $('undo-toast-msg').textContent = msg;
  toast.style.display = 'flex';
  const btn = $('undo-toast-btn');
  btn.onclick = async () => {
    clearTimeout(undoTimer);
    toast.style.display = 'none';
    await undoFn();
  };
  undoTimer = setTimeout(() => { toast.style.display = 'none'; }, 5000);
}

// ── Q coach card (draggable, matches writer.html) ───────────────

const coachCard  = $('coach-card');
const coachMsg   = $('coach-msg');
const coachInput = $('coach-input');
const coachTab   = $('coach-tab');
let coachBusy    = false;

function appendCoachLine(cls, text) {
  const p = document.createElement('p');
  p.className = cls;
  p.textContent = text;
  coachMsg.appendChild(p);
  coachMsg.scrollTop = coachMsg.scrollHeight;
  return p;
}
appendCoachLine('', 'Ask me anything about your calendar or tasks.');

coachInput.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter' || coachBusy) return;
  e.preventDefault();
  const text = coachInput.value.trim();
  if (!text) return;
  coachInput.value = '';
  appendCoachLine('u-line', text);
  coachBusy = true;
  const thinking = appendCoachLine('thinking', 'Thinking…');
  try {
    const r = await fetch('/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, surface: 'life', reasoningEffort: 'off' }),
    });
    const data = await r.json();
    thinking.className = '';
    thinking.textContent = data.reply || data.error || 'Something went wrong.';
  } catch {
    thinking.className = '';
    thinking.textContent = 'Could not reach Q.';
  }
  coachBusy = false;
});

$('q-close').addEventListener('click', () => {
  coachCard.style.display = 'none';
  coachTab.style.display = 'block';
});
coachTab.addEventListener('click', () => {
  coachCard.style.display = 'flex';
  coachTab.style.display = 'none';
  coachInput.focus();
});

// Draggable — same logic as writer.html
let drag = null;
coachCard.addEventListener('mousedown', startCoachDrag);
coachCard.addEventListener('touchstart', startCoachDrag, { passive: false });
window.addEventListener('mousemove', moveCoachDrag);
window.addEventListener('touchmove', moveCoachDrag, { passive: false });
window.addEventListener('mouseup', endCoachDrag);
window.addEventListener('touchend', endCoachDrag);

function startCoachDrag(ev) {
  if (ev.target === coachInput || ev.target.id === 'q-close') return;
  const point = ev.touches ? ev.touches[0] : ev;
  const rect = coachCard.getBoundingClientRect();
  coachCard.style.right = 'auto'; coachCard.style.transform = 'none';
  coachCard.style.left = rect.left + 'px'; coachCard.style.top = rect.top + 'px';
  drag = { startX: point.clientX, startY: point.clientY, baseLeft: rect.left, baseTop: rect.top };
  ev.preventDefault();
}
function moveCoachDrag(ev) {
  if (!drag) return;
  const point = ev.touches ? ev.touches[0] : ev;
  const newLeft = Math.max(8, Math.min(window.innerWidth  - coachCard.offsetWidth  - 8, drag.baseLeft + point.clientX - drag.startX));
  const newTop  = Math.max(8, Math.min(window.innerHeight - coachCard.offsetHeight - 8, drag.baseTop  + point.clientY - drag.startY));
  coachCard.style.left = newLeft + 'px'; coachCard.style.top = newTop + 'px';
}
function endCoachDrag() {
  if (!drag) return; drag = null;
  try { localStorage.setItem('q-life-pos', JSON.stringify({ left: coachCard.style.left, top: coachCard.style.top })); } catch (_) {}
}
try {
  const saved = JSON.parse(localStorage.getItem('q-life-pos') || 'null');
  if (saved?.left && saved?.top) {
    coachCard.style.right = 'auto'; coachCard.style.transform = 'none';
    coachCard.style.left = saved.left; coachCard.style.top = saved.top;
  }
} catch (_) {}

// ── Collapse toggles ────────────────────────────────────────────

function toggleCollapse(bodyId, btnId) {
  const body = $(bodyId);
  const btn  = $(btnId);
  const collapsed = body.classList.toggle('body-collapsed');
  btn.textContent = collapsed ? '▸' : '▾';
}
$('reminder-toggle').addEventListener('click', () => toggleCollapse('reminder-body', 'reminder-toggle'));
$('task-toggle').addEventListener('click',     () => toggleCollapse('task-body',     'task-toggle'));

// ── Init ────────────────────────────────────────────────────────

(async () => {
  // Categories first so events/tasks can resolve their colours on render.
  await loadCategories();
  await Promise.all([loadEvents(), loadTasks()]);
})();
</script>
