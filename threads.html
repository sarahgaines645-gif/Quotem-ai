<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/q-auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q Threads — Your Situations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e8e8; --text: #1a1a1a;
    --text-muted: rgba(0,0,0,0.42); --text-faint: rgba(0,0,0,0.26);
    --shadow-light: #ffffff; --shadow-dark: #ababab;
    --accent: #e91e63; --accent-soft: rgba(233,30,99,0.12);
    --neu-raised: 10px 10px 28px #ababab, -8px -8px 20px #ffffff, inset 0 1px 0 rgba(255,255,255,0.5);
    --neu-raised-sm: 6px 6px 16px #ababab, -5px -5px 12px #ffffff;
    --neu-inset: inset 5px 5px 14px #ababab, inset -4px -4px 10px #ffffff;
    --neu-inset-sm: inset 3px 3px 8px #ababab, inset -2px -2px 6px #ffffff;
    --neu-inset-xs: inset 3px 3px 8px #ababab, inset -2px -2px 6px #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Space Grotesk', -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.55; min-height: 100vh; padding: 32px 24px 80px; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 820px; margin: 0 auto; }
  header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .logo-mark { display: inline-flex; align-items: baseline; }
  .logo-mark .q { font-size: 28px; font-weight: 700; line-height: 1; letter-spacing: -0.05em; }
  .logo-mark .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-left: 4px; align-self: flex-end; margin-bottom: 4px; box-shadow: 0 1px 2px rgba(233,30,99,0.3); }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; }
  .header-sub { font-size: 12px; color: var(--text-muted); margin-left: 4px; }
  .back-link { margin-left: auto; font-size: 12px; color: var(--text-muted); text-decoration: none; }
  .back-link:hover { color: var(--text); }

  .controls { display: flex; gap: 10px; margin-bottom: 18px; align-items: center; flex-wrap: wrap; }
  .search { flex: 1; min-width: 220px; border: none; outline: none; font-family: inherit; font-size: 14px; color: var(--text); background: var(--bg); padding: 11px 16px; border-radius: 12px; box-shadow: var(--neu-inset-sm); }

  .threads-list { display: flex; flex-direction: column; gap: 12px; }
  .thread-card {
    background: var(--bg); border-radius: 16px; padding: 18px 20px;
    box-shadow: var(--neu-raised-sm); cursor: pointer;
    transition: color 0.15s; text-decoration: none; color: var(--text);
    display: block;
  }
  .thread-card:hover { color: var(--accent); }
  .thread-card:active { box-shadow: var(--neu-inset-xs); }
  .tc-row1 { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .tc-title { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; flex: 1; min-width: 0; }
  .tc-status { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; padding: 3px 10px; border-radius: 7px; box-shadow: var(--neu-inset-xs); color: var(--text-faint); }
  .tc-status.open      { color: var(--accent); }
  .tc-status.resolved  { color: var(--text-muted); }
  .tc-summary { font-size: 13px; color: var(--text-muted); margin-top: 5px; }
  .tc-meta { display: flex; gap: 14px; margin-top: 10px; font-size: 11px; color: var(--text-faint); }
  .tc-meta-item { display: inline-flex; align-items: center; gap: 4px; }

  .empty {
    text-align: center; padding: 80px 24px; color: var(--text-muted);
    background: var(--bg); border-radius: 18px; box-shadow: var(--neu-inset-sm);
  }
  .empty .em { font-size: 42px; margin-bottom: 10px; }
  .empty h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .empty p { font-size: 14px; max-width: 480px; margin: 0 auto; }
  .empty a { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="logo-mark"><span class="q">Q</span><span class="dot"></span></span>
    <h1>Your Threads</h1>
    <span class="header-sub">situations Q's helping you with</span>
    <a href="/chat" class="back-link">← back to Q</a>
  </header>

  <div class="controls">
    <input type="text" class="search" id="search" placeholder="Search by title…">
  </div>

  <div id="threads-list" class="threads-list"></div>
  <div id="empty-state" class="empty" style="display:none;">
    <div class="em">📁</div>
    <h3>No threads yet</h3>
    <p>When you give Q an email or situation in the <a href="/email-writer">email writer</a> and ask him to save it as a folder, it'll appear here.</p>
  </div>
</div>

<script>
const $list   = document.getElementById('threads-list');
const $empty  = document.getElementById('empty-state');
const $search = document.getElementById('search');
let all = [];

function fmtAgo(iso) {
  if (!iso) return '';
  const ms = Date.now() - new Date(iso).getTime();
  if (ms < 60_000) return 'just now';
  const m = Math.floor(ms / 60_000);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const d = Math.floor(h / 24);
  if (d < 30) return d + 'd ago';
  return new Date(iso).toLocaleDateString();
}

function render(list) {
  $list.innerHTML = '';
  if (!list.length) {
    $empty.style.display = 'block';
    return;
  }
  $empty.style.display = 'none';
  for (const t of list) {
    const a = document.createElement('a');
    a.className = 'thread-card';
    a.href = '/thread/' + t.id;
    const status = t.status || 'open';
    a.innerHTML = `
      <div class="tc-row1">
        <div class="tc-title">${escapeHtml(t.title || '(untitled)')}</div>
        <div class="tc-status ${status}">${status}</div>
      </div>
      ${t.summary ? `<div class="tc-summary">${escapeHtml(t.summary)}</div>` : ''}
      <div class="tc-meta">
        <span class="tc-meta-item">📨 ${(t.emails || []).length} email${(t.emails || []).length === 1 ? '' : 's'}</span>
        <span class="tc-meta-item">💬 ${(t.chatHistory || []).length} message${(t.chatHistory || []).length === 1 ? '' : 's'}</span>
        <span class="tc-meta-item">🕐 ${fmtAgo(t.updatedAt)}</span>
      </div>`;
    $list.appendChild(a);
  }
}

function applyFilter() {
  const q = $search.value.trim().toLowerCase();
  if (!q) return render(all);
  render(all.filter(t =>
    (t.title || '').toLowerCase().includes(q) ||
    (t.summary || '').toLowerCase().includes(q)
  ));
}

$search.addEventListener('input', applyFilter);

(async () => {
  try {
    const res = await fetch('/api/threads');
    all = await res.json();
    render(all);
  } catch (e) {
    $list.innerHTML = '<div class="empty">Could not load threads: ' + escapeHtml(e.message) + '</div>';
  }
})();

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
