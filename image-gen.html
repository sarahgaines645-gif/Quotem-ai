<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/q-auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q Image Gen — text to image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e8e8; --text: #1a1a1a;
    --text-muted: rgba(0,0,0,0.42); --text-faint: rgba(0,0,0,0.26);
    --shadow-light: #ffffff; --shadow-dark: #ababab;
    --accent: #e91e63;
    --neu-raised:    10px 10px 28px #ababab, -8px -8px 20px #ffffff, inset 0 1px 0 rgba(255,255,255,0.5);
    --neu-raised-sm: 6px 6px 16px #ababab, -5px -5px 12px #ffffff;
    --neu-inset:     inset 5px 5px 14px #ababab, inset -4px -4px 10px #ffffff;
    --neu-inset-sm:  inset 3px 3px 8px #ababab, inset -2px -2px 6px #ffffff;
    --neu-inset-xs:  inset 3px 3px 8px #ababab, inset -2px -2px 6px #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 15px; line-height: 1.55;
    min-height: 100vh; padding: 32px 24px 80px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1000px; margin: 0 auto; }
  header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
  .logo-mark { display: inline-flex; align-items: baseline; }
  .logo-mark .q { font-size: 28px; font-weight: 700; line-height: 1; letter-spacing: -0.05em; }
  .logo-mark .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-left: 4px; align-self: flex-end; margin-bottom: 4px; box-shadow: 0 1px 2px rgba(233,30,99,0.3); }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .tagline { font-size: 13px; color: var(--text-muted); margin-left: auto; }

  .card { background: var(--bg); border-radius: 18px; padding: 18px; box-shadow: var(--neu-raised); margin-bottom: 18px; }
  label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  textarea, input[type="text"], input[type="number"], select {
    width: 100%; border: none; outline: none;
    font-family: inherit; font-size: 14px;
    color: var(--text); background: var(--bg);
    padding: 10px 14px; border-radius: 10px;
    box-shadow: var(--neu-inset-sm); margin-bottom: 12px;
  }
  textarea { min-height: 80px; resize: vertical; line-height: 1.5; }

  details { margin-top: 6px; margin-bottom: 12px; }
  summary { cursor: pointer; font-size: 11px; color: var(--text-muted); padding: 4px 0; }
  details[open] summary { color: var(--text); }

  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 110px; }
  .row label { display: block; }
  .row input, .row select { margin-bottom: 0; }

  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
  button {
    border: none; cursor: pointer;
    background: var(--bg); color: var(--text);
    font-family: inherit; font-size: 14px; font-weight: 600;
    padding: 10px 22px; border-radius: 12px;
    box-shadow: var(--neu-raised-sm);
  }
  button:hover:not(:disabled) { color: var(--accent); }
  button:active:not(:disabled) { box-shadow: var(--neu-inset-xs); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { font-size: 12px; color: var(--text-muted); }
  .status .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 6px; animation: pulse 1.2s infinite; vertical-align: middle; }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  .result { display: none; }
  .result.show { display: block; }
  .result img {
    display: block; width: 100%; height: auto;
    border-radius: 12px;
    box-shadow: var(--neu-raised);
  }
  .result-actions { display: flex; gap: 10px; margin-top: 12px; }

  .back-link { display: inline-block; margin-top: 32px; font-size: 12px; color: var(--text-muted); text-decoration: none; }
  .back-link:hover { color: var(--text); }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <span class="logo-mark"><span class="q">Q</span><span class="dot"></span></span>
    <h1>Image Gen</h1>
    <span class="tagline">Z-Image-Turbo · Apache 2.0 · runs on HF ZeroGPU.</span>
  </header>

  <div class="card">
    <label for="prompt">Prompt</label>
    <textarea id="prompt" placeholder="A photorealistic timber-frame Cotswolds cottage at golden hour, drystone walls, hollyhocks beside the door, soft natural light"></textarea>

    <details>
      <summary>Advanced options</summary>
      <label for="neg">Negative prompt (optional)</label>
      <input type="text" id="neg" placeholder="blurry, low quality, watermark, text">
      <div class="row">
        <label>Width<input type="number" id="width" value="1024" min="512" max="2048" step="64"></label>
        <label>Height<input type="number" id="height" value="1024" min="512" max="2048" step="64"></label>
        <label>Steps<input type="number" id="steps" value="8" min="1" max="30"></label>
        <label>Guidance<input type="number" id="guidance" value="1.0" min="0" max="7.5" step="0.1"></label>
        <label>Seed<input type="number" id="seed" value="-1" placeholder="-1 random"></label>
      </div>
    </details>

    <div class="controls">
      <button id="generate">Generate</button>
      <span class="status" id="status"></span>
    </div>
  </div>

  <div class="card result" id="result-card">
    <img id="image" alt="Generated">
    <div class="result-actions">
      <button id="download">Download PNG</button>
      <button id="copy">Copy as data URL</button>
    </div>
  </div>

  <a href="/chat" class="back-link">← back to Q's chat</a>
</div>

<script>
const $prompt = document.getElementById('prompt');
const $neg = document.getElementById('neg');
const $width = document.getElementById('width');
const $height = document.getElementById('height');
const $steps = document.getElementById('steps');
const $guidance = document.getElementById('guidance');
const $seed = document.getElementById('seed');
const $generate = document.getElementById('generate');
const $status = document.getElementById('status');
const $resultCard = document.getElementById('result-card');
const $image = document.getElementById('image');
const $download = document.getElementById('download');
const $copy = document.getElementById('copy');

let lastBlob = null;
let elapsedTimer = null;
let lastPromptForFilename = '';

$generate.addEventListener('click', async () => {
  const prompt = $prompt.value.trim();
  if (!prompt) { $prompt.focus(); return; }
  $generate.disabled = true;
  $resultCard.classList.remove('show');

  const start = Date.now();
  elapsedTimer = setInterval(() => {
    const sec = ((Date.now() - start) / 1000).toFixed(1);
    $status.innerHTML = '<span class="dot"></span>Generating… ' + sec + 's';
  }, 100);

  try {
    const body = {
      prompt,
      negativePrompt: $neg.value || undefined,
      steps: parseInt($steps.value) || undefined,
      guidanceScale: parseFloat($guidance.value),
      seed: parseInt($seed.value),
      width: parseInt($width.value) || undefined,
      height: parseInt($height.value) || undefined,
    };
    const res = await fetch('/image-gen/generate', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    clearInterval(elapsedTimer); elapsedTimer = null;

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'HTTP ' + res.status }));
      $status.textContent = 'Error: ' + (err.error || 'unknown');
      $generate.disabled = false;
      return;
    }
    const blob = await res.blob();
    lastBlob = blob;
    lastPromptForFilename = prompt.substring(0, 60).replace(/[^a-z0-9]+/gi, '-').toLowerCase();
    const url = URL.createObjectURL(blob);
    $image.src = url;
    $resultCard.classList.add('show');
    const dur = res.headers.get('X-Generation-Ms');
    $status.textContent = dur ? 'Done in ' + (parseInt(dur) / 1000).toFixed(1) + 's' : 'Done';
  } catch (e) {
    clearInterval(elapsedTimer); elapsedTimer = null;
    $status.textContent = 'Network error: ' + e.message;
  } finally {
    $generate.disabled = false;
  }
});

$download.addEventListener('click', () => {
  if (!lastBlob) return;
  const url = URL.createObjectURL(lastBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (lastPromptForFilename || 'q-image') + '.png';
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
});

$copy.addEventListener('click', async () => {
  if (!lastBlob) return;
  const reader = new FileReader();
  reader.onloadend = async () => {
    try {
      await navigator.clipboard.writeText(String(reader.result || ''));
      $copy.textContent = 'Copied ✓';
      setTimeout(() => { $copy.textContent = 'Copy as data URL'; }, 2000);
    } catch (e) {
      alert('Could not copy: ' + e.message);
    }
  };
  reader.readAsDataURL(lastBlob);
});
</script>

<script src="/trace-widget.js"></script>
</body>
</html>
